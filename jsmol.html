<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSmol Viewer - SMILES + MOL</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }
    </style>
    <script src="./scripts/compounds.js"></script>
    <script src="./scripts/blurbs.js"></script>
    <script src="https://3Dmol.org/build/3Dmol-min.js" defer></script>
    <script src="https://3Dmol.org/build/3Dmol.ui-min.js" defer></script>
    <script src="//unpkg.com/alpinejs" defer></script>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <script>
        window.addEventListener('resize', () => {
            if (this.viewer) {
                this.viewer.resize();
                this.viewer.render();
            }
        });
        function jsmolApp() {
            return {
                selectedId: 'benzyl_benzoate',
                customSmiles: '',
                compounds: compounds || [],
                viewer: null,

                init() {
                    this.viewer = $3Dmol.createViewer("viewer", {
                        backgroundColor: "white"
                    });

                    this.viewer.zoomTo();
                    this.viewer.render();

                    this.$nextTick(() => {
                        // ensure default exists
                        if (!this.selectedId && this.compounds.length) {
                            this.selectedId = this.compounds[9].self_id;
                        }

                        // FORCE DOM update before loading molecule
                        this.$nextTick(() => {
                            this.loadSelected();
                        });
                    });
                    this.$watch('selectedId', () => this.loadSelected());
                },

                get selectedCompound() {
                    return this.compounds.find(
                        c => String(c.self_id) === String(this.selectedId)
                    );
                },

                async loadSelected() {
                    console.log(`Loading compound: ${this.selectedCompound.name}`)
                    const compound = this.selectedCompound;

                    if (!compound || !this.viewer) return;

                    this.viewer.clear();

                    try {
                        // Try local MOL/SDF file first
                        const response = await fetch(`./mol3d/${compound.cas_no}.mol3d`);

                        if (!response.ok)
                            throw new Error('3D file not found');

                        const molData = await response.text();

                        this.viewer.addModel(molData, "mol");
                        this.viewer.setStyle({}, {
                            stick: {},
                            sphere: {
                                scale: 0.25
                            }
                        });

                        this.viewer.zoomTo();
                        this.viewer.render();

                        console.log("Loaded local MOL file");
                    } catch (err) {
                        console.warn("Falling back to SMILES");

                        if (!compound.smiles) return;

                        await this.loadSmiles(compound.smiles);
                    }
                },

                async loadSmiles(smiles) {
                    if (!smiles || !this.viewer) return;

                    try {
                        const response = await fetch(
                            `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/${encodeURIComponent(smiles)}/SDF?record_type=3d`
                        );

                        const sdf = await response.text();

                        this.viewer.clear();
                        this.viewer.addModel(sdf, "sdf");

                        this.viewer.setStyle({}, {
                            stick: {},
                            sphere: {
                                scale: 0.25
                            }
                        });

                        this.viewer.zoomTo();
                        this.viewer.render();
                    } catch (err) {
                        console.error("Unable to generate 3D structure", err);
                    }
                },

                loadCustomSmiles() {
                    if (this.customSmiles) {
                        this.loadSmiles(this.customSmiles);
                    }
                },

                resetView() {
                    if (!this.viewer) return;

                    this.viewer.zoomTo();
                    this.viewer.render();
                },

                get compoundsWithSmiles() {
                    return this.compounds.filter(c => c?.smiles);
                },

                get getParent() {
                    const parentCompound = this.selectedCompound?.parent_molecule;

                    return parentCompound
                        ? blurbs.find(b => b.parent_molecule === parentCompound)
                        : null;
                },

            };
        }
    </script>
</head>
<body>

<div class="container" x-data="jsmolApp()" x-init="init()">
    <!-- Header -->
    <h1 class="mb-3">Molecule Viewer</h1>

    <div class="row">
        <div class="col-12">

            <!-- WRAPPER DIV (IMPORTANT) -->
            <div id="viewer-wrapper" class="mb-4">

                <div
                        id="viewer"
                        class="w-100 border rounded bg-light"
                        style="height: min(60vh, 300px); position: relative;">
                </div>

            </div>

        </div>
    </div>
    <div class="row">
        <div class="col-12">

            <!-- Controls -->
            <div class="controls">
                <label>
                    Compound:
                    <select :key="selectedId" x-model="selectedId" @change="loadSelected()" style="min-width: 320px;">
                        <template x-for="compound in compoundsWithSmiles" :key="compound.self_id">
                            <option :value="compound.self_id"
                                    x-text="compound.name + (compound?.blurb ? '*' : '')"></option>
                        </template>
                    </select>
                </label>

            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <!-- Info -->
            <div class="mt-3">
                <h3 x-text="selectedCompound?.name"></h3>
                <template x-if="selectedCompound?.image">
                    <div>
                        <img
                                :src="`data:image/png;base64,${selectedCompound?.image}`"
                                alt=""
                                class="img-fluid mb-2"
                                style="max-width: 300px;"
                        >
                    </div>
                </template>
                <template x-if="getParent">
                    <div>
                        <br/>
                        <h4>Mode Of Action</h4>
                        <div x-text="getParent?.mode_of_action" style="white-space: pre-line;"></div>

                        <h4>Molecular Target</h4>
                        <div x-text="getParent?.molecular_target" style="white-space: pre-line;"></div>

                        <h4>Therapeutic Class</h4>
                        <div x-text="getParent?.therapeutic_class" style="white-space: pre-line;"></div>

                        <br/>
                        <h4>Information</h4>
                        <div x-text="getParent?.blurb" style="white-space: pre-line;"></div>
                        <br/>
                        <div x-text="selectedCompound?.blurb" style="white-space: pre-line;"></div>
                    </div>
                </template>

            </div>

        </div>
    </div>
</div>

</body>

</html>
