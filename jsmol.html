<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSmol Viewer - SMILES + MOL</title>
    <script src="https://chemapps.stolaf.edu/jmol/jsmol/JSmol.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #viewer {
            width: 800px;
            height: 400px;
            border: 1px solid #ccc;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }
    </style>
    <script src="./scripts/compounds.js"></script>
    <script src="./scripts/blurbs.js"></script>

    <script src="//unpkg.com/alpinejs" defer></script>

</head>
<body>
<h1>JSmol Viewer</h1>
<script>
    var Info = {
        width: 800,
        height: 400,
        debug: false,
        color: "#FFFFFF",
        use: "HTML5",
        j2sPath: "https://chemapps.stolaf.edu/jmol/jsmol/j2s",
        script: "set antialiasDisplay ON; background white; zoom 100;"
    };

    var jmolApplet = Jmol.getApplet("jmolApplet", Info);

    // Load a default molecule
    Jmol.script(jmolApplet, 'load $CCO;');  // Ethanol as example
</script>
<div class="container" x-data="jsmolApp()" x-init="init()">
    <!-- Controls -->
    <div class="controls">
        <label>
            Compound:
            <select x-model="selectedId" @change="loadSelected()" style="min-width: 320px;">
                <option value="">-- Select a compound --</option>
                <template x-for="compound in compoundsWithSmiles" :key="compound.self_id">
                    <option :value="compound.self_id" x-text="compound.name"></option>
                </template>
            </select>
        </label>

        <br>

        <input type="text" x-model="customSmiles" placeholder="Or enter custom SMILES..." size="60">
        <button @click="loadCustomSmiles()">Load SMILES</button>
        <button @click="resetView()">Reset View</button>
    </div>

    <!-- JSmol Viewer -->
    <div id="jsmolDiv"></div>

    <!-- Info -->
    <div class="mt-3">
        <h3 x-text="selectedCompound?.name"></h3>
        <template x-if="selectedCompound?.image">
            <div>
                <img
                        :src="`data:image/png;base64,${selectedCompound?.image}`"
                        alt=""
                        class="img-fluid mb-2"
                        style="max-width: 200px;"
                >
            </div>
        </template>
        <template x-if="getParent">
            <div>
                <br/>
                <h4>Mode Of Action</h4>
                <div x-text="getParent?.mode_of_action" style="white-space: pre-line;"></div>

                <h4>Molecular Target</h4>
                <div x-text="getParent?.molecular_target" style="white-space: pre-line;"></div>

                <h4>Therapeutic Class</h4>
                <div x-text="getParent?.therapeutic_class" style="white-space: pre-line;"></div>

                <br/>
                <h4>Information</h4>
                <div x-text="getParent?.blurb" style="white-space: pre-line;"></div>
                <br/>
                <div x-text="selectedCompound?.blurb" style="white-space: pre-line;"></div>
            </div>
        </template>

        </div>

</div>

<script>
    function jsmolApp() {
        return {
            selectedId: '',
            customSmiles: '',
            compounds: compounds || [],
            jmolApplet: jmolApplet,
            selectedCompound: 'benzyl_alcohol',
            init() {

            },
            get selectedCompound() {
                return this.compounds.find(c => String(c.self_id) === String(this.selectedId));
            },

            loadSelected() {
                const compound = this.selectedCompound;
                this.compound = compound;
                if (!compound?.smiles || !this.jmolApplet) return;

                let load = `load ${compound.smiles}`;
                if (typeof compound.mol3d !== 'undefined') {
                    load = `load DATA 'model' ${compound.mol3d}\n end 'model'`;
                }

                fetch(`./mol3d/${compound.cas_no}.mol3d`).then(response => {
                        if (!response.ok) throw new Error("Local 3D file not found");
                        return response.text();
                    })
                    .then(mol3dText => {
                        console.log("✅ Loaded local 3D file");
                        Jmol.script(this.jmolApplet, `
                            load inline "${mol3dText.replace(/"/g, '\\"')}";
                            delay 0.4;
                            zoom 85;
                            rotate y 25;
                            refresh;
                        `);
                    })
                    .catch(err => {
                        console.warn("Local .mol3d not found, falling back to SMILES...", err.message);

                        if (compound.smiles) {
                            Jmol.script(this.jmolApplet, `
                            load $${compound.smiles};
                            delay 0.6;
                            zoom 85;
                            rotate y 25;
                            refresh;
                        `);
                        } else {
                            console.error("No SMILES available either.");
                        }
                    });
            },

            loadCustomSmiles() {
                if (this.customSmiles && this.jmolApplet) {
                    Jmol.script(jmolApplet, `load $${this.customSmiles};`);
                }
            },

            get compoundsWithSmiles() {
                return this.compounds.filter(compound => compound && compound.smiles);
            },
            get getParent() {
                let parentCompound = this.selectedCompound.parent_molecule;
                if (parentCompound) {
                    return blurbs.find(b => b.parent_molecule === parentCompound);
                } else {
                    return "no parent compound found";
                }
            },
            resetView() {
                if (this.jmolApplet) {
                    Jmol.script(this.jmolApplet, 'reset; zoom 80;');
                }
            }
        };
    }
</script>
</body>

</html>
