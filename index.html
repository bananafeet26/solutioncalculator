<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Solution Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script src="./scripts/app.js"></script>
    <script src="./scripts/compounds.js"></script>
    <script src="./scripts/chartSettings.js"></script>
    <script src="./scripts/maths.js"></script>
    <script src="./scripts/constants.js"></script>
    <script src="./scripts/recipes.js"></script>
    <script src="./scripts/i18n.js"></script>

    <!-- Load Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>

    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" href="favicon.ico">

    <!-- Load Excel Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"
            integrity="sha512-UnrKxsCMN9hFk7M56t4I4ckB4N/2HHi0w/7+B/1JsXIX3DmyBcsGpT3/BsuZMZf+6mAr0vP81syWtfynHJ69JA=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"
            integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
</head>
<body class="container-fluid gx-2" x-data="compoundApp()" x-init="init(); updateChart();"
      :data-bs-theme="settings.theme">
<div>
    <h2 class="title text-center">
        <span x-text="translations.title[settings.currentLanguage]"></span>
        <button
                class="btn"
                @click="changeTheme()"
        >
        <span x-text="settings.theme === 'light'
              ? '🌙 ' + (translations.darkMode[settings.currentLanguage] || 'Dark Mode')
              : '☀️ ' +  (translations.lightMode[settings.currentLanguage] || 'Light Mode')">
</span>
        </button>
    </h2>
    <div class="row gx-2">
        <!-------------------------------------- Chart --------------------------------------------------------->
        <div class="col-12 col-md-6 col-lg-4 mb-2 ">
            <div class="border rounded p-1">
                <!-------------------------------------- Chart  --------------------------------------->
                <div style="position: relative; height: 20vh">
                    <canvas id="myChart"></canvas>
                </div>

                <!-------------------------------------- Palette Select  --------------------------------------->
                <div class="mb-2">
                    <div class="d-flex gap-2">

                        <!-- Palette Selector -->
                        <div class="flex-grow-1 border rounded p-1">
                            <label style="font-size: 0.75rem;" class="form-label x-small text-muted mb-1">
                                <span x-text="translations.palette[settings.currentLanguage]"></span> 🎨
                            </label>
                            <select class="form-select"
                                    x-model="settings.selectedPalette"
                                    @change="changePalette()">
                                <option value="nature">Nature</option>
                                <option value="ocean">Ocean</option>
                                <option value="sunset">Sunset</option>
                                <option value="neon">Neon</option>
                                <option value="unique">Unique</option>
                            </select>
                        </div>

                        <!-- Language Selector -->
                        <div class="flex-grow-1 border rounded p-1">
                            <label style="font-size: 0.75rem;" class="form-label small text-muted mb-1">
                                <span x-text="translations.language_label[settings.currentLanguage]"></span> 🌐
                            </label>
                            <select class="form-select"
                                    x-model="settings.currentLanguage"
                                    @change="changeLanguage()">
                                <template x-for="language in availableLanguages">
                                    <option :value="language.code"
                                            :selected="language.code === settings.currentLanguage">
                                        <span x-text="language.name"></span>
                                    </option>
                                </template>
                            </select>
                        </div>

                    </div>
                </div>

                <!--------------------------------------- Select Recipe --------------------------------->
                <div class="p-1 border rounded ">
                    <div class="d-flex gap-3">
                        <div class="flex-grow-1 p-1">
                            <label style="font-size: 0.75rem;" class="form-label small text-muted mb-1">
                                <span x-text="translations.load_recipe[settings.currentLanguage]"></span>
                            </label>
                            <select
                                    class="form-select"
                                    x-model="settings.selectedRecipeId"
                                    @change="updateRecipe();"
                            >
                                <option x-text="translations.load_recipe[settings.currentLanguage] + ' 👨‍🍳🍽️'"
                                        :value="undefined" disabled></option>
                                <template x-for="recipeType in RECIPETYPES" :key="recipeType">
                                    <!-- Use optgroup for the section headers -->
                                    <optgroup :label="recipeType.toUpperCase()">
                                        <template
                                                x-for="recipeItem in settings.recipes.filter(r => r.type === recipeType).sort((a, b) => a.name.localeCompare(b.name))"
                                                :key="getRecipeIndex(recipeItem.id)">

                                            <option
                                                    :value="getRecipeIndex(recipeItem.id)"
                                                    :selected="getRecipeIndex(recipeItem.id) === settings.selectedRecipeId"
                                                    x-text="recipeItem.name"
                                                    :disabled="getRecipeIndex(recipeItem.id) === settings.selectedRecipeId"
                                            >
                                            </option>

                                        </template>
                                    </optgroup>
                                </template>

                            </select>
                        </div>

                    </div>
                    <!--------------------------------------- Blurb --------------------------------->
                    <template x-if="typeof getRecipeBlurb !== 'undefined'">
                        <div class="m-2 p-1 text-wrap fst-italic">
                            <div class="border-start border-3 border-secondary ps-3 fst-italic"
                                 x-html="getRecipeBlurb"></div>
                            <template x-if="typeof getRecipeSource !== 'undefined'">
                                <div>
                                    <small>
                                        <a
                                                :href="getRecipeSource"
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                class="text-decoration-none"
                                        >
                                            View Reference
                                        </a>
                                    </small>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

            </div>
            <!-- Hardware Recommendation Widget -->
            <div class="mt-2 border rounded">
                <div class="p-1">
                    <div class="border-start border-3 border-secondary ps-3">
                        <!-- Header & Dynamic Tier Badge -->
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <h6 class="mb-0 text-body-secondary fw-bold"
                                x-text="translations.hardwareTitle[settings.currentLanguage] || 'Recommended Hardware'"></h6>
                            <span class="badge px-2.5 py-1.5 rounded"
                                  :class="{
                                          'bg-success-subtle text-success border border-success-subtle': settings.injectionReport.classification.id === 1,
                                          'bg-warning-subtle text-warning border border-warning-subtle': settings.injectionReport.classification.id === 2,
                                          'bg-danger-subtle text-danger border border-danger-subtle': settings.injectionReport.classification.id === 3
                                      }"
                                  x-text="settings.injectionReport.classification.name">
                                </span>
                        </div>
                    </div>

                    <p class="small text-body-secondary mb-3"
                       x-text="settings.injectionReport.classification.description"></p>

                    <div class="row g-2">
                        <template x-for="config in settings.injectionReport.idealConfigurations"
                                  :key="config.barrel + '-' + config.gauge">
                            <div class="col-12 col-sm-6">
                                <div class="p-1 border border-translucent rounded bg-body d-flex align-items-center justify-content-between text-nowrap"
                                     style="min-width: 0;">
                                    <div class="lh-sm min-w-0 flex-grow-1 overflow-hidden me-2">
                            <span class="fw-bold text-body text-nowrap"
                                  style="font-size: calc(0.85rem + 0.15vw);"
                                  x-text="config.gauge + 'G Needle'"></span>
                                        <span class="d-block text-body-secondary style-barrel-text"
                                              style="font-size: 0.75rem;"
                                              x-text="'Barrel: ' + config.barrel"></span>
                                    </div>
                                    <div class="flex-shrink-0">
                            <span class="badge border border-translucent font-monospace py-1 px-1.5"
                                  style="font-size: 0.75rem;"
                                  :class="getForceClassification(config.forceN)"
                                  x-text="config.forceN + ' N'">
</span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="text-body-secondary small border-translucent pt-2 d-flex">
                        <span class="me-1">💡</span>
                        <span x-text="settings.injectionReport.classification.recommendation"></span>
                    </div>
                </div>
            </div>

        </div>
        <!-------------------------------------- Formulation Control Col --------------------------------------->
        <div class="col-12 col-md-6 col-lg-4 mb-2">
            <div class="border rounded pt-0 pb-3 p-1">
                <!-- Compounds Entry Group-->
                <!-- v_v_percent -->
                <div class="form-group">
                    <div class="d-flex align-items-center my-3">
                            <span x-text="translations.solvents[settings.currentLanguage]"
                                  class="me-2 fw-semibold"></span>
                        <div class="flex-grow-1 border-bottom"></div>
                    </div>
                    <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'v_v_percent')"
                              :key="solutionEntry.self_id">
                        <div>
                            <label class="me-2 fst-italic"
                                   x-text="`${solutionEntry.translations?.[settings.currentLanguage] || solutionEntry.name}` + ' ................'"></label>
                            <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            data-bs-toggle="dropdown">
                                        ⋮
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button x-text="translations.buttons.delete[settings.currentLanguage]"
                                                    class="dropdown-item text-danger"
                                                    @click="removeCompound(solutionEntry.self_id)">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <!-- mL -->
                                <template x-if="solutionEntry.input === 1">
                                    <input class="form-control rounded "
                                           type="text"
                                           min="0.5"
                                           step="1"
                                           x-model.number="solutionEntry.mls"
                                           @change="updateFields(solutionEntry, settings, 'mls');updateChart();"
                                    >
                                </template>
                                <!-- v_v_percent -->
                                <template x-if="solutionEntry.input === 0">
                                    <input :class="checkSolvents(solutionEntry, settings.compounds, settings.totalVolume) + ' form-control rounded '"
                                           type="text"
                                           min="0.5"
                                           max="100"
                                           step="1"
                                           x-model.number="solutionEntry.v_v_percent"
                                           @change="updateFields(solutionEntry, settings, 'v_v_percent'); updateChart();"
                                    >
                                </template>
                                <!-- mg_per_ml -->
                                <template x-if="solutionEntry.input === 2">
                                    <input class="form-control rounded"
                                           min="0.5"
                                           type="text"
                                           :class="checkSaturation(solutionEntry, settings.compounds, settings.totalVolume)"
                                           inputmode="decimal"
                                           max="10000"
                                           step="2.5"
                                           x-model.number="solutionEntry.mg_per_ml"
                                           @change="updateFields(solutionEntry, settings, 'mg_per_ml'); updateChart();"
                                    >
                                </template>
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                            data-bs-toggle="dropdown">
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[0]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 0">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[1]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 1">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[2]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 2">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <div class="d-flex flex-column">
                                    <button type="button"
                                            class="btn btn-sm btn-outline-secondary py-0 px-2"
                                            style="font-size:1rem; line-height:1;"
                                            @click="
                                                        solutionEntry.mls = Number(solutionEntry.mls || 0) + 2.5;
                                                        updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                    ">
                                        ▲
                                    </button>

                                    <button type="button"
                                            class="btn btn-sm btn-outline-secondary py-0 px-2"
                                            style="font-size:1rem; line-height:1;"
                                            @click="
                                                    solutionEntry.mls = Math.max(0.5, Number(solutionEntry.mls || 0) - 2.5);
                                                    updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                ">
                                        ▼
                                    </button>
                                </div>
                                <template x-if="solutionEntry.self_id === 'benzyl_alcohol' ">
                                    <div class="invalid-feedback"
                                         x-text="translations.message_ba[settings.currentLanguage]"></div>
                                </template>
                                <template x-if="solutionEntry.self_id === 'benzyl_benzoate' ">
                                    <div class="invalid-feedback"
                                         x-text="translations.message_bb[settings.currentLanguage]"></div>
                                </template>
                            </div>
                        </div>
                    </template>
                    <!--------------- Saturation Temp------------------>
                    <template x-if="settings.solventPercentage !== 0">
                        <div>
                            <span class="small"
                                  x-text="translations.solvents[settings.currentLanguage] + ' ' + (settings.solventPercentage.toFixed()) + ' % v.v'"></span>
                            <div class="progress mb-1" style="height: 20px;">
                                <div class="progress-bar progress-bar-striped"
                                     :class="{
                                      'bg-danger': settings.solventPercentageRating <= 25,
                                      'bg-warning': settings.solventPercentageRating > 25 && settings.solventPercentageRating <= 50,
                                      'bg-info': settings.solventPercentageRating > 50 && settings.solventPercentageRating <= 75,
                                      'bg-success': settings.solventPercentageRating > 75
                                   }"
                                     :style="`width: ${settings.solventPercentageRating}%`"
                                     role="progressbar"
                                     aria-valuemin="0"
                                     aria-valuemax="100">
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                <!-- q.s. -->
                <div class="form-group">
                    <div class="d-flex align-items-center my-3">
                            <span x-text="translations.excipients[settings.currentLanguage]"
                                  class="me-2 fw-semibold"></span>
                        <div class="flex-grow-1 border-bottom"></div>
                    </div>
                    <template
                            x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'q.s.')"
                            :key="solutionEntry.self_id">
                        <div>
                            <label class="me-2 fst-italic"
                                   x-text="((solutionEntry.translations?.[settings.currentLanguage] || solutionEntry.name) + (solutionEntry.qsMode ? ' q.s.' : '')) + ' ................'">
                            </label>
                            <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            data-bs-toggle="dropdown">
                                        ⋮
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <!--
                                            <button class="dropdown-item text-danger"
                                                    @click="toggleQS(solutionEntry.self_id)">
                                                q.s.
                                                <span x-text="solutionEntry.qsMode ? 'off' : 'on'"></span>
                                            </button>
                                            -->
                                            <button x-text="translations.buttons.delete[settings.currentLanguage]"
                                                    class="dropdown-item text-danger"
                                                    @click="removeCompound(solutionEntry.self_id)">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <!-- mL -->
                                <template x-if="solutionEntry.input === 0">
                                    <input class="form-control rounded"
                                           type="text"
                                           min="0.5"
                                           step="5"
                                           :disabled="qsMode()"
                                           x-model.number="solutionEntry.mls"
                                           @change="updateFields(solutionEntry, settings, 'mls');updateChart();"
                                    >

                                </template>
                                <!-- grams -->
                                <template x-if="solutionEntry.input === 1">

                                    <input class="form-control rounded"
                                           type="text"
                                           min="0.5"
                                           step="5"
                                           :disabled="qsMode()"
                                           x-model.number="solutionEntry.grams"
                                           @change="updateFields(solutionEntry, settings, 'grams');updateChart();">
                                </template>
                                <!-- mg_per_ml -->
                                <template x-if="solutionEntry.input === 2">
                                    <input class="form-control rounded"
                                           min="0.5"
                                           type="number"
                                           :class="checkSaturation(solutionEntry, settings.compounds, settings.totalVolume)"
                                           inputmode="text"
                                           max="10000"
                                           step="2.5"
                                           :disabled="qsMode()"
                                           x-model.number="solutionEntry.mg_per_ml"
                                           @change="updateFields(solutionEntry, settings, 'mg_per_ml'); updateChart();">
                                </template>
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                            data-bs-toggle="dropdown">
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[0]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 0">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[1]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 1">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[2]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 2">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <div class="d-flex flex-column">
                                    <button type="button"
                                            class="btn btn-sm btn-outline-secondary py-0 px-2"
                                            style="font-size:1rem; line-height:1;"
                                            :disabled="qsMode()"
                                            @click="
                                                        solutionEntry.mls = Number(solutionEntry.mls || 0) + 2.5;
                                                        updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                    ">
                                        ▲
                                    </button>

                                    <button type="button"
                                            class="btn btn-sm btn-outline-secondary py-0 px-2"
                                            style="font-size:1rem; line-height:1;"
                                            :disabled="qsMode()"
                                            @click="
                                                    solutionEntry.mls = Math.max(0.5, Number(solutionEntry.mls || 0) - 2.5);
                                                    updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                ">
                                        ▼
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                    <!--------------- Saturation Temp------------------>
                    <template x-if="settings.solventPercentage !== 0">
                        <div>
                            <span class="small"
                                  x-text="translations.viscosity[settings.currentLanguage] + ' ' + ((settings.viscosity ?? 0).toFixed()) + ' cP'">
                            </span>
                            <div class="progress mb-1" style="height: 20px;">
                                <div class="progress-bar progress-bar-striped"
                                     :class="{
                                          'bg-danger': settings.viscosityRating <= 25,
                                          'bg-warning': settings.viscosityRating > 25 && settings.viscosityRating <= 50,
                                          'bg-info': settings.viscosityRating > 50 && settings.viscosityRating <= 75,
                                          'bg-success': settings.viscosityRating > 75
                                       }"
                                     :style="`width: ${settings.viscosityRating ?? 0}%`"
                                     role="progressbar"
                                     aria-valuemin="0"
                                     aria-valuemax="100">
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                <!-- mg_per_ml -->
                <div class="form-group">
                    <div class="d-flex align-items-center my-3">
                            <span x-text="translations.compounds[settings.currentLanguage]"
                                  class="me-2 fw-semibold"></span>
                        <div class="flex-grow-1 border-bottom opacity-50"></div>
                    </div>
                    <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'mg_per_ml')"
                              :key="solutionEntry.self_id">
                        <div>
                            <label class="me-2 fst-italic"
                                   x-text="`${solutionEntry.translations?.[settings.currentLanguage] || solutionEntry.name}` + ' ................'"></label>

                            <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            data-bs-toggle="dropdown">
                                        ⋮
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">

                                        <li>
                                            <button x-text="translations.buttons.delete[settings.currentLanguage]"
                                                    class="dropdown-item text-danger"
                                                    @click="removeCompound(solutionEntry.self_id)">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <!-- mg_per_ml -->
                                <template x-if="solutionEntry.input === 0">
                                    <input class="form-control rounded"
                                           min="0"
                                           type="number"
                                           :class="checkSaturation(solutionEntry, settings.compounds, settings.totalVolume)"
                                           inputmode="decimal"
                                           max="10000"
                                           step="2.5"
                                           x-model.number="solutionEntry.mg_per_ml"
                                           @change="
                                                     const val = parseFloat(solutionEntry.mg_per_ml);

                                                     if (!isNaN(val) && val >= 0.5) {
                                                       updateFields(solutionEntry, settings, 'mg_per_ml');
                                                     }

                                                     updateChart();
                                                   ">
                                </template>
                                <!-- purity -->
                                <template x-if="solutionEntry.input === 2">
                                    <input class="form-control rounded"
                                           min="0"
                                           type="number"
                                           :class="checkSaturation(solutionEntry, settings.compounds, settings.totalVolume)"
                                           inputmode="decimal"
                                           max="100"
                                           step="2.5"
                                           x-model.number="solutionEntry.purity"
                                           @change="
                                                     const val = verifyPercentage(solutionEntry.purity);
                                                     solutionEntry.purity = val;
                                                     updateFields(solutionEntry, settings, 'purity');
                                                     updateChart();
                                                   ">
                                </template>
                                <!-- grams -->
                                <template x-if="solutionEntry.input === 1">
                                    <input class="form-control rounded"
                                           type="number"
                                           step="5"
                                           x-model.number="solutionEntry.grams"
                                           @change="updateFields(solutionEntry, settings, 'grams');updateChart();"
                                    >
                                </template>
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                            data-bs-toggle="dropdown">
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[0]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 0">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[1]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 1">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='"purity " + availableInputLabels(solutionEntry)[2]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 2">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <div class="invalid-feedback"
                                     x-text="translations.message_compound[settings.currentLanguage](
                                             getLowerRangeForConcentration(solutionEntry),
                                             getUpperRangeForConcentration(solutionEntry)
                                         )">
                                </div>

                            </div>
                        </div>
                    </template>
                    <div class="input-group">
                        <div x-show="settings.remainingVolume < 0"
                             class="alert alert-danger" role="alert">
                            ⚠️ <strong>
                            <span x-text="Math.abs(settings.remainingVolume).toFixed(4)"></span> mL over volume
                        </strong>
                        </div>
                    </div>
                    <!--------------- Saturation Temp------------------>
                    <template x-if="settings.saturationTemp !== undefined">
                        <div>
                                <span class="small"
                                      x-text="translations.saturationTemp[settings.currentLanguage] + ': ' + (settings.saturationTemp ?? 0).toFixed(1) + '%'">
                                </span>

                            <div class="progress mb-1" style="height: 20px;">
                                <div class="progress-bar progress-bar-striped"
                                     :class="{
                                            'bg-danger': settings.saturationTemp >= 75,   'bg-warning': settings.saturationTemp >= 50 && settings.saturationTemp < 75,
                                            'bg-info': settings.saturationTemp >= 25 && settings.saturationTemp < 50,
                                            'bg-success': settings.saturationTemp < 25    }"
                                     :style="`width: ${settings.saturationTemp ?? 0}%`"
                                     role="progressbar"
                                     aria-valuemin="0"
                                     aria-valuemax="100">
                                </div>
                            </div>

                            <span x-text="translations.message_crashing[settings.currentLanguage]"
                                  x-show="settings.saturationTemp >= 75 && settings.saturationTemp < 100"
                                  class="text-danger small"></span>
                            <span x-text="translations.message_in_vivo_crystallization[settings.currentLanguage]"
                                  x-show="settings.saturationTemp >= 100" class="text-danger small"></span>

                        </div>
                    </template>
                </div>


            </div>
            <div class="border rounded pb-3 p-1 mt-2">

                <div class="flex-grow-1 p-1">
                    <label style="font-size: 0.75rem;" class="form-label small text-muted mb-1">
                        <span x-text="translations.finished_volume[settings.currentLanguage]"></span>
                    </label>
                    <div class="input-group">
                        <!-- Number Input -->
                        <input class="form-control text-end"
                               type="number"
                               min="5"
                               step="5"
                               x-model.number="settings.totalVolume"
                               @change="updateVolume(settings.totalVolume, settings.compounds); updateChart();"
                               placeholder="0">

                        <!-- Unit addon -->
                        <span class="input-group-text">mL</span>
                    </div>
                </div>
                <!--------------------------------------- Drop down form control --------------------------------->
                <div class="mt-2">
                    <div class="d-flex gap-3">
                        <div class="flex-grow-1">
                            <select
                                    class="form-select"
                                    x-model="settings.addRowSelectedCompoundId"
                                    @change="addCompoundRow('excipient'); settings.addRowSelectedCompoundId = '';updateChart();"
                            >
                                <option x-text="translations.add_excipient[settings.currentLanguage] + ' 🍶'"
                                        value=""></option>
                                <template
                                        x-for="compound in COMPOUNDS.filter(c => c.basis !== 'mg_per_ml')"
                                        :key="compound.self_id"
                                >
                                    <option
                                            :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                            :value="compound.self_id"
                                            x-text="compound.translations?.[settings.currentLanguage] || compound.name">
                                    </option>
                                </template>
                            </select>
                        </div>
                        <div class="flex-grow-1">
                            <select
                                    class="form-select"
                                    x-model="settings.addRowSelectedCompoundId"
                                    @change="addCompoundRow('ingredient'); settings.addRowSelectedCompoundId = '';updateChart();"
                            >
                                <option x-text="translations.add_compound[settings.currentLanguage] + ' 🥣'"
                                        value=""></option>

                                <template
                                        x-for="compound in COMPOUNDS.filter(c => c.basis === 'mg_per_ml')"
                                        :key="compound.self_id"
                                >
                                    <option
                                            :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                            :value="compound.self_id"
                                            x-text="compound.translations?.[settings.currentLanguage] || compound.name">
                                    </option>
                                </template>
                            </select>
                            <!--
                            <button class="btn btn-outline-secondary"
                                    @click="anaylseBatch()">Analyse
                            </button>
                            -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-------------------------------------- Batch --------------------------------------------------------->
        <div class="col-12 col-lg-4 mb-1">
            <div class="border rounded">
                <div class="p-1 bg-warning-subtle border-bottom">
                    <h4 class="fw-bold text-center d-flex align-items-center justify-content-center gap-2">
                        <span x-text="translations.batch_totals[settings.currentLanguage]"></span>
                    </h4>
                    <h7 class="fw-bold text-center d-flex align-items-center justify-content-center gap-2">
                        <template
                                x-if="typeof settings.selectedRecipeId !== 'undefined' && settings.recipes[settings.selectedRecipeId]">
                            <!-- Styled input that blends seamlessly into the h4 header -->
                            <input
                                    type="text"
                                    x-model="settings.recipes[settings.selectedRecipeId].name"
                                    class="form-control-plaintext fw-bold text-center p-0 w-auto d-inline-block border focus-ring"
                                    style="min-width: 150px; outline: none;"
                            />
                        </template>
                        ✏️
                    </h7>
                </div>
                <template x-for="solutionMeasurement in solutionMeasurements" :key="solutionMeasurement.id">
                    <div>
                        <!-- ===================== COMPOUNDS ===================== -->
                        <template x-for="(compound, index) in solutionMeasurement.compounds" :key="compound.id">

                            <div
                                    class="p-1 mb-0 "
                                    :class="index % 2 === 0 ? 'bg-body-tertiary' : 'bg-body'"
                            >
                                <!-- Compound Name -->
                                <template x-if="compound.basis === 'mg_per_ml'">
                                    <div class="d-flex align-items-center mb-2 fst-italic">
                                        <!-- Left: name -->
                                        <span x-text="compound.translations?.[settings.currentLanguage] || compound.name"></span>
                                        <!-- Middle: flexible dotted line -->
                                        <span class="flex-grow-1 mx-2 border-bottom border-dotted"></span>
                                        <!-- Right: value -->
                                        <span
                                                x-text=" +
                                                    (isNaN(compound.purity)
                                                        ? '0.00'
                                                        : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.purity).toFixed(4))
                                                    ) + '% ' + translations.purity[settings.currentLanguage]"
                                        ></span>
                                    </div>
                                </template>

                                <!-- Compound name other -->
                                <template x-if="compound.basis !== 'mg_per_ml'">
                                    <div class="d-flex align-items-center mb-2 fst-italic">

                                        <!-- Left: name -->
                                        <span x-text="compound.translations?.[settings.currentLanguage] || compound.name"></span>

                                        <!-- Middle: flexible dotted line -->
                                        <span class="flex-grow-1 mx-2 border-bottom border-dotted"></span>

                                        <!-- Right: value -->
                                        <span
                                                x-text="
                                                        (isNaN(compound.v_v_percent)
                                                            ? '0.00'
                                                            : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.v_v_percent).toFixed(4))
                                                        ) +
                                                        '% v/v'"
                                        ></span>

                                    </div>
                                </template>
                                <!-- Compound mg/mL -->
                                <template x-if="compound.basis !== 'q.s.'">
                                    <div class="d-flex justify-content-between small">
                                        <span x-text="translations.concentration[settings.currentLanguage]"></span>
                                        <span
                                                x-text="(isNaN(compound.mg_per_ml)
                                                        ? '0.00'
                                                        : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.mg_per_ml).toFixed(4))
                                                    ) +
                                                    ' mg/mL'"
                                        ></span>
                                    </div>
                                </template>

                                <!-- Viscosity -->
                                <template x-if="compound.basis !== 'mg_per_ml'">
                                    <div class="d-flex justify-content-between small">
                                        <span x-text="translations.viscosity[settings.currentLanguage]"></span>
                                        <span x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.viscosityArray[0]).toFixed(4)) + ' cP'"></span>
                                    </div>
                                </template>

                                <!-- Volume / Displacement -->
                                <div class="d-flex justify-content-between small">
                                    <template x-if="compound.basis === 'mg_per_ml'">
                                        <span x-text="translations.displacement[settings.currentLanguage]"></span>
                                    </template>
                                    <template x-if="compound.basis !== 'mg_per_ml'">
                                        <span x-text="translations.volume[settings.currentLanguage]"></span>
                                    </template>

                                    <span>
                                        <span
                                                x-text="
                                                (isNaN(compound.mls)
                                                    ? '0.00'
                                                    : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.mls).toFixed(4))
                                                ) + ' ml'
                                            "
                                        ></span>
                                     </span>
                                </div>
                                <!-- Melting point -->
                                <template
                                        x-if="compound.basis === 'mg_per_ml' && compound.melting_point && !isNaN(compound.melting_point[0])">
                                    <div class="d-flex justify-content-between small">
                                        <span x-text="translations.melting_point[settings.currentLanguage]"></span>
                                        <span
                                                x-text="
                                                    new Intl.NumberFormat([settings.currentLanguage, 'en'])
                                                        .format(Number(compound.melting_point[0]).toFixed(4))
                                                    + ' C'
                                                "
                                        ></span>
                                    </div>
                                </template>
                                <!-- Weight -->
                                <div class="d-flex justify-content-between small">
                                    <span x-text="translations.weight[settings.currentLanguage]"></span>
                                    <span
                                            x-text="
                                                        (isNaN(compound.grams)
                                                            ? '0.00'
                                                            : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.grams).toFixed(4))
                                                        ) + ' gm'
                                                    "
                                    ></span>
                                </div>

                            </div>
                        </template>

                        <!-- ===================== TOTALS ===================== -->
                        <div class="p-1 bg-warning-subtle border-bottom">
                            <div x-text="translations.batch_totals[settings.currentLanguage]"
                                 class="fw-bold mb-2"></div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.total_displacement[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(calculateBatchTotals(solutionMeasurement.compounds).mls.toFixed(4)) + ' ml'"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.total_weight[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(calculateBatchTotals(solutionMeasurement.compounds).grams.toFixed(4)) + ' gm'"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.filter_time[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(solutionMeasurement.filterTime.toFixed(4)) + ' ' + translations.minutes[settings.currentLanguage]"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.excip_viscosity[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(solutionMeasurement.viscosity.toFixed(4)) + ' cP'"
                                ></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <!--------------------------------------- Download group --------------------------------->
            <div class="mt-2 border rounded">
                <div class=" d-flex flex-wrap align-items-center gap-2 p-1">

                    <!-- Main Download Group -->
                    <div class="d-flex gap-1 flex-wrap" role="group" aria-label="Batch Actions">

                        <button @click='downloadBatchText("txt")'
                                class="btn btn-sm btn-primary py-1 px-2"
                                :title="translations.buttons.download_batch[settings.currentLanguage]">
                            ⬇️📄 <span class=" 	.d-none .d-xl-block .d-xxl-none"
                                      x-text="translations.buttons.download_batch[settings.currentLanguage]"></span>
                        </button>

                        <button @click='downloadBatchText("xls")'
                                class="btn btn-sm text-small btn-primary py-1 px-2"
                                :title="translations.buttons.download_pricing[settings.currentLanguage]">
                            ⬇️📊 <span class=" 	.d-none .d-xl-block .d-xxl-none"
                                      x-text="translations.buttons.download_pricing[settings.currentLanguage]"></span>
                        </button>

                        <!-- Banana Download + Upload in one row -->
                        <button @click='downloadBanana()'
                                class="btn btn-sm btn-primary py-1 px-2"
                                :title="translations.buttons.download_recipe[settings.currentLanguage]">
                            ⬇️🍌 <span class=" 	.d-none .d-xl-block .d-xxl-none"
                                      x-text="translations.buttons.download_recipe[settings.currentLanguage]"></span>
                        </button>

                        <button type="button"
                                @click="$refs.batchFileUploader.click()"
                                class="btn btn-sm btn-primary py-1 px-2"
                                :title="translations.buttons.upload_recipe[settings.currentLanguage]">
                            ⬆️🍌 <span class=" 	.d-none .d-xl-block .d-xxl-none"
                                      x-text="translations.buttons.upload_recipe[settings.currentLanguage]"></span>
                        </button>

                        <!-- Hidden File Input -->
                        <input type="file"
                               x-ref="batchFileUploader"
                               @change="loadLocalFile($event)"
                               accept=".json,.banana"
                               class="d-none">
                    </div>


                </div>
                <!-- Product Insert Link -->
                <a @click='generateProductInsertUrl()'
                   class="  gap-1 text-decoration-none ms-auto"
                   :title="translations.buttons.product_insert[settings.currentLanguage]">
                    🔗 <span class=".d-none .d-sm-block"
                            x-text="translations.buttons.product_insert[settings.currentLanguage]"></span>
                </a>
            </div>
        </div>
    </div>

</div>
</div>
</body>
</html>
