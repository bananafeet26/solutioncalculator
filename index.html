<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="./scripts/app.js"></script>
    <script src="./scripts/compounds.js"></script>
    <script src="./scripts/chartSettings.js"></script>
    <script src="./scripts/maths.js"></script>
    <!-- Load Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>

    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@^1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-piechart-outlabels"></script>

    <link rel="stylesheet" href="./style.css">

</head>
<body>
<div class="container" x-data="compoundApp()" x-init="init(); updateChart();" :class="theme">

    <div class="header-row">
        <h2 class="title">
            <span>Formulation Calculator</span>
        </h2>

        <div class="theme-toggle">
            <label class="switch">
                <input type="checkbox"
                       :checked="theme === 'dark'"
                       @change="
theme = $event.target.checked ? 'dark': 'light';
localStorage.setItem('theme', theme);
updateChart();
">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- Canvas for Chart.js -->
    <canvas style="max-height: 30vh" id="myChart"></canvas>

    <h3>Adjust Settings</h3>
    <!-- Formulation Control -->
    <div class="form-grid" x-effect="updateChart()" x-on:change="updateChart()">
        <div class="compound-row">
            <div class="input-group">
                <label for="totalVolume">Finished Volume</label>
                <input
                        type="number"
                        min="0"
                        step="10"
                        x-model.number="settings.totalVolume"
                        @input="updateVolume(settings.totalVolume, settings.compounds);
                                updateChart();  "
                        @blur="settings.totalVolume = parseFloat(settings.totalVolume.toFixed(2))"
                >
            </div>
        </div>
        <!-- Compounds -->
        <template x-for="solutionEntry in settings.compounds" :key="solutionEntry.self_id">
            <div class="compound-row mb-2">
                <span x-text="solutionEntry.name"></span>
                <template x-if="solutionEntry.basis !== 'mg_per_ml'">
                    <div class="input-group">
                        <!-- mL -->
                        <input
                                :style="solutionEntry.basis !== 'foo'
                            ? 'background-color: #fff;'
                            : 'background-color: #f3f3f3;'"
                                type="number"
                                min="0"
                                step="5"
                                x-model.number="solutionEntry.mls"
                                @input="updateFields(solutionEntry, settings, 'mls');"
                                @blur="solutionEntry.mls = parseFloat(solutionEntry.mls.toFixed(2))"
                        > <span class="unit">mL</span>
                    </div>
                </template>
                <template x-if="solutionEntry.basis !== 'v_v_percent'">
                    <div class="input-group">
                        <!-- grams -->
                        <input
                                type="number"
                                min="0"
                                step="5"
                                x-model.number="solutionEntry.grams"
                                @input="updateFields(solutionEntry, settings, 'grams');"
                                @blur="solutionEntry.grams = parseFloat(solutionEntry.grams.toFixed(2))"
                        > <span class="unit">g</span>
                    </div>
                </template>
                <template x-if="solutionEntry.basis === 'v_v_percent'">
                    <div class="input-group">
                        <!-- v_v_percent -->
                        <input
                                type="number"
                                min="0"
                                max="100"
                                step="0.5"
                                x-model.number="solutionEntry.v_v_percent"
                                @input="updateFields(solutionEntry, settings, 'v_v_percent')"
                                @blur="solutionEntry.v_v_percent = parseFloat(solutionEntry.v_v_percent.toFixed(2))"
                        > <span class="unit">%</span>
                    </div>
                </template>
                <template x-if="solutionEntry.basis === 'mg_per_ml'">
                    <div class="input-group">
                        <!-- mg/mL -->
                        <input
                                type="number"
                                min="0"
                                max="1000"
                                step="5"
                                x-model.number="solutionEntry.mg_per_ml"
                                @input="updateFields(solutionEntry, settings, 'mg_per_ml');"
                                @blur="solutionEntry.mg_per_ml = parseFloat(solutionEntry.mg_per_ml.toFixed(2))"
                        >
                        <span class="unit">mg/mL</span>
                    </div>
                </template>
                <button @click="removeCompound(solutionEntry.self_id)">🗑️</button>
            </div>
        </template>
    </div>
    <div class="compound-row mb-2">
        <div class="input-group">
            <div x-show="settings.remainingVolume < 0"
                 :class="settings.remainingVolume < 0 ? 'warning-box danger' : 'warning-box ok'">
                <span x-text="Math.abs(settings.remainingVolume).toFixed(2)"></span> mL over volume
            </div>
        </div>
    </div>
    <!-- dropdown -->
    <div class="compound-row">
        <select x-model="settings.addRowSelectedCompoundId">
            <option value="" selected>Select compound</option>

            <template x-for="compound in compounds" :key="compound.self_id">
                <option
                        :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                        :value="compound.self_id"
                        x-text="compound.name">
                </option>
            </template>
        </select>
        <button :class="{ inactive: settings.compounds.length >= compounds.length }" @click="addCompoundRow()">Add
            compound
        </button>
        <button @click="anaylseBatch()">Analyse Batch</button>
    </div>

    <!-- Rating system -->
    <div class="progress mb-1" style="height: 20px;">
        <div class="progress-bar "
             :class="{
          'bg-danger': settings.viscosityRating <= 25,
          'bg-warning': settings.viscosityRating > 25 && settings.viscosityRating <= 50,
          'bg-info': settings.viscosityRating > 50 && settings.viscosityRating <= 75,
          'bg-success': settings.viscosityRating > 75
       }"
             :style="`width: ${settings.viscosityRating}%`"
             role="progressbar"
             aria-valuemin="0"
             aria-valuemax="100">
            <span x-text="'Viscosity ' + settings.viscosity.toFixed() + ' cP'"></span>
        </div>
    </div>
    <div class="progress mb-1" style="height: 20px;">
        <div class="progress-bar "
             :class="{
          'bg-danger': settings.solventPercentageRating <= 25,
          'bg-warning': settings.solventPercentageRating > 25 && settings.solventPercentageRating <= 50,
          'bg-info': settings.solventPercentageRating > 50 && settings.solventPercentageRating <= 75,
          'bg-success': settings.solventPercentageRating > 75
       }"
             :style="`width: ${settings.solventPercentageRating}%`"
             role="progressbar"
             aria-valuemin="0"
             aria-valuemax="100">
            <span x-text="'Solvents ' + (settings.solventPercentage.toFixed()) + ' % v.v'"></span>
        </div>
    </div>

    <!-- Formulation overview -->
    <h3>Formulation overview</h3>
    <template x-for="solutionMeasurement in solutionMeasurements" :key="solutionMeasurement.id">
        <div>
            <!-- TABLE VIEW -->
            <table class="simple-table">
                <thead>
                <tr>
                    <th>Calculated measurements</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td style="width: 30%;">Viscosity:</td>
                    <td x-text="solutionMeasurement.viscosity.toFixed(2) + ' cP'"></td>
                </tr>
                <tr>
                    <td>Est filter time:</td>
                    <td x-text="solutionMeasurement.filterTime.toFixed(2) + ' minutes'"></td>
                </tr>
                </tbody>
            </table>
            <!-- TABLE VIEW -->
            <table class="simple-table">
                <thead>
                <th>Compound</th>
                <th>Volume</th>
                <th>Concentration</th>
                </thead>
                <tbody>
                <template x-for="compound in solutionMeasurement.compounds" :key="compound.id">
                    <tr>
                        <td x-text="compound.name"></td>
                    <template x-if="compound.basis === 'v_v_percent'">
                        <td x-text="compound.mls.toFixed(2) + ' ml '"></td>
                    </template>
                    <template x-if="compound.basis === 'v_v_percent'">
                        <td x-text="compound.v_v_percent.toFixed(2) + ' % v/v '"></td>
                    </template>
                    <template x-if="compound.basis === 'q.s.'">
                        <td x-text="compound.v_v_percent.toFixed(2) + ' ml'"></td>
                    </template>
                    <template x-if="compound.basis === 'q.s.'">
                        <td x-text="compound.v_v_percent.toFixed(2) + ' % v/v '"></td>
                    </template>
                    <template x-if="compound.basis === 'mg_per_ml'">
                        <td x-text="compound.grams.toFixed(2) + ' gm (' + compound.mls.toFixed(2) + ' ml)'"></td>
                    </template>
                    <template x-if="compound.basis === 'mg_per_ml'">
                        <td x-text="compound.mg_per_ml.toFixed(2) + ' mg/ml'"></td>
                    </template>
                    </tr>
                </template>
                </tbody>
            </table>
            <button @click="deleteBatch(solutionMeasurement.id)">Delete Batch</button>
        </div>
    </template>
</div>


</body>
</html>
