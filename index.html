<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Solution Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script src="./scripts/app.js"></script>
    <script src="./scripts/compounds.js"></script>
    <script src="./scripts/chartSettings.js"></script>
    <script src="./scripts/maths.js"></script>
    <script src="./scripts/constants.js"></script>
    <script src="./scripts/recipes.js"></script>

    <!-- Load Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>

    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" href="favicon.ico">

</head>
<body class="container-fluid " x-data="compoundApp()" x-init="init(); updateChart();" :data-bs-theme="settings.theme">
<div>
    <h2 class="title text-center">
        <span>Formulation Calculator</span>
        <button
                class="btn"
                @click="inputTheme()"
        >
            <span x-text="settings.theme === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode'"></span>
        </button>
    </h2>
    <!-------------------------------------- Graphing System Col ------------------------------------------->
    <div class="row">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="border rounded">
                <!-------------------------------------- Chart  --------------------------------------->

                <div style="position: relative;">
                    <canvas id="myChart"></canvas>
                </div>


                <!-------------------------------------- Dynamic Ratings  --------------------------------------->
                <div class=" p-3 mb-2 ">
                    <div class="input-group mb-1 col-12 col-md-4 col-lg-3">
                        <div class="input-group-prepend">
                            <span x-text="'Palette 🎨'" class="input-group-text" id=""></span>
                        </div>
                        <select
                                class="form-select w-25 mb-3"
                                x-model="settings.selectedPalette"
                                @change="changePalette()"
                        >
                            <option value="nature">Nature</option>
                            <option value="ocean">Ocean</option>
                            <option value="sunset">Sunset</option>
                            <option value="neon">Neon</option>
                            <option value="unique">Unique</option>

                        </select>

                        <template x-for="color in colours">
                            <div
                                    style="width:60px;height:60px;display:inline-block;margin:5px;border-radius:8px"
                                    :style="`background:${color}`"
                            ></div>
                        </template>

                    </div>
                    <template x-if="settings.solventPercentage !== 0">
                        <span class="small"
                              x-text="'Viscosity ' + ((settings.viscosity ?? 0).toFixed()) + ' cP'">
                        </span>
                        <div class="progress mb-1" style="height: 20px;">
                            <div class="progress-bar progress-bar-striped"
                                 :class="{
                  'bg-danger': settings.viscosityRating <= 25,
                  'bg-warning': settings.viscosityRating > 25 && settings.viscosityRating <= 50,
                  'bg-info': settings.viscosityRating > 50 && settings.viscosityRating <= 75,
                  'bg-success': settings.viscosityRating > 75
               }"
                                 :style="`width: ${settings.viscosityRating ?? 0}%`"
                                 role="progressbar"
                                 aria-valuemin="0"
                                 aria-valuemax="100">
                                </div>
                        </div>
                    </template>
                    <template x-if="settings.solventPercentage !== 0">
                        <span class="small" x-text="'Solvents ' + (settings.solventPercentage.toFixed()) + ' % v.v'"></span>
                        <div class="progress mb-1" style="height: 20px;">
                            <div class="progress-bar progress-bar-striped"
                                 :class="{
                  'bg-danger': settings.solventPercentageRating <= 25,
                  'bg-warning': settings.solventPercentageRating > 25 && settings.solventPercentageRating <= 50,
                  'bg-info': settings.solventPercentageRating > 50 && settings.solventPercentageRating <= 75,
                  'bg-success': settings.solventPercentageRating > 75
               }"
                                 :style="`width: ${settings.solventPercentageRating}%`"
                                 role="progressbar"
                                 aria-valuemin="0"
                                 aria-valuemax="100">
                            </div>
                        </div>
                    </template>
                    <div class="hr"></div>

                </div>
                <!--------------------------------------- Select Recipe --------------------------------->
                <div class="p-2 row">
                    <div class="d-flex gap-2">
                        <select
                                class="form-select"
                                x-model="settings.selectedRecipeId"
                                @change="updateRecipe();"
                        >
                            <option value="">Load Recipe 👨‍🍳🍽️</option>
                            <template x-for="(recipe, index) in recipes" :key="index">
                                <option :text="recipe.name" :value="index"><span x-text="recipe.name"></span></option>

                            </template>
                        </select>

                    </div>
                </div>
                <!--------------------------------------- Drop down form control --------------------------------->
                <div class="p-2 row">
                    <div class="d-flex gap-2">
                        <select
                                class="form-select"
                                x-model="settings.addRowSelectedCompoundId"
                                @change="addCompoundRow('excipient'); settings.addRowSelectedCompoundId = '';updateChart();"
                        >
                            <option value="">Add excipient 🍶</option>
                            <template
                                    x-for="compound in compounds.filter(c => c.basis !== 'mg_per_ml')"
                                    :key="compound.self_id"
                            >
                                <option
                                        :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                        :value="compound.self_id"
                                        x-text="compound.name">
                                </option>
                            </template>
                        </select>
                        <select
                                class="form-select"
                                x-model="settings.addRowSelectedCompoundId"
                                @change="addCompoundRow('ingredient'); settings.addRowSelectedCompoundId = '';updateChart();"
                        >
                            <option value="">Add compound 🥣</option>
                            <template
                                    x-for="compound in compounds.filter(c => c.basis === 'mg_per_ml')"
                                    :key="compound.self_id"
                            >
                                <option
                                        :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                        :value="compound.self_id"
                                        x-text="compound.name">
                                </option>
                            </template>
                        </select>
                        <!--
                        <button class="btn btn-outline-secondary"
                                @click="anaylseBatch()">Analyse
                        </button>
                        -->
                    </div>
                </div>
            </div>
        </div>
        <!-------------------------------------- Formulation Control Col --------------------------------------->
        <div class="col-12 col-md-6 col-lg-4 mt-2">
            <div class="border rounded pb-3 p-2">
                <!-- Formulation Control -->
                <div>
                    <!-- Volume -->
                    <div class="input-group mb-1">
                        <div class="input-group-prepend">
                            <span x-text="'Finished Volume ⚗️'" class="input-group-text" id=""></span>
                        </div>
                        <!-- mL -->
                        <input class="form-control col-3"
                               type="number"
                               min="0"
                               step="5"
                               x-model.number="settings.totalVolume"
                               @change="updateVolume(settings.totalVolume, settings.compounds); updateChart();"
                        >
                        <!-- v_v_percent -->
                        <div class="input-group-append">
                            <span class="input-group-text">mL</span>
                        </div>

                    </div>
                    <!-- Compounds Entry Group-->
                    <!-- v_v_percent -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span class="me-2 fw-semibold">Solvents</span>
                            <div class="flex-grow-1 border-bottom"></div>
                        </div>
                        <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'v_v_percent')"
                                  :key="solutionEntry.self_id">
                            <div>
                                <label class="me-2 fst-italic"
                                       x-text="`${solutionEntry.name}` + ' ................'"></label>
                                <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                data-bs-toggle="dropdown">
                                            ⋮
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button class="dropdown-item text-danger"
                                                        @click="removeCompound(solutionEntry.self_id)">
                                                    Delete
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- mL -->
                                    <template x-if="solutionEntry.input === 1">
                                        <input class="form-control "
                                               type="text"
                                               min="0.5"
                                               step="2.5"
                                               x-model.number="solutionEntry.mls"
                                               @change="updateFields(solutionEntry, settings, 'mls');updateChart();"
                                               >
                                    </template>
                                    <!-- v_v_percent -->
                                    <template x-if="solutionEntry.input === 0">
                                        <input :class="checkSolvents(solutionEntry, compounds, settings.totalVolume) + ' form-control '"
                                               type="text"
                                               min="0.5"
                                               max="100"
                                               step="2.5"
                                               x-model.number="solutionEntry.v_v_percent"
                                               @change="updateFields(solutionEntry, settings, 'v_v_percent'); updateChart();"
                                               >
                                    </template>
                                    <!-- mg_per_ml -->
                                    <template x-if="solutionEntry.input === 2">
                                        <input class="form-control"
                                               min="0.5"
                                               type="text"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="decimal"
                                               max="10000"
                                               step="2.5"
                                               x-model.number="solutionEntry.mg_per_ml"
                                               @change="updateFields(solutionEntry, settings, 'mg_per_ml'); updateChart();"
                                               >
                                    </template>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                                data-bs-toggle="dropdown">
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[0]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 0">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[1]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 1">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[2]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 2">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="d-flex flex-column">
                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                @click="
                                                        solutionEntry.mls = Number(solutionEntry.mls || 0) + 2.5;
                                                        updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                    ">
                                            ▲
                                        </button>

                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                @click="
                                                    solutionEntry.mls = Math.max(0.5, Number(solutionEntry.mls || 0) - 2.5);
                                                    updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                ">
                                            ▼
                                        </button>
                                    </div>
                                    <template x-if="solutionEntry.self_id === 'benzyl_alcohol' ">
                                        <div class="invalid-feedback"
                                             x-text="'Recommended BA range: 0.9%-10% v.v'"></div>
                                    </template>
                                    <template x-if="solutionEntry.self_id === 'benzyl_benzoate' ">
                                        <div class="invalid-feedback" x-text="'Recommended BB range: 0%-55% v.v'"></div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                    <!-- q.s. -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span class="me-2 fw-semibold">Excipients</span>
                            <div class="flex-grow-1 border-bottom"></div>
                        </div>
                        <template
                                x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'q.s.')"
                                :key="solutionEntry.self_id">
                            <div>
                                <label class="me-2 fst-italic"
                                       x-text=" + solutionEntry.qsMode ? `${solutionEntry.name} q.s.` : `${solutionEntry.name}` + ' ................'"></label>

                                <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                data-bs-toggle="dropdown">
                                            ⋮
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <!--
                                                <button class="dropdown-item text-danger"
                                                        @click="toggleQS(solutionEntry.self_id)">
                                                    q.s.
                                                    <span x-text="solutionEntry.qsMode ? 'off' : 'on'"></span>
                                                </button>
                                                -->
                                                <button class="dropdown-item text-danger"
                                                        @click="removeCompound(solutionEntry.self_id)">
                                                    Delete
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- mL -->
                                    <template x-if="solutionEntry.input === 0">
                                        <input class="form-control"
                                               type="text"
                                               min="0.5"
                                               step="5"
                                               :disabled="qsMode()"
                                               x-model.number="solutionEntry.mls"
                                               @change="updateFields(solutionEntry, settings, 'mls');updateChart();"
                                               >

                                    </template>
                                    <!-- grams -->
                                    <template x-if="solutionEntry.input === 1">

                                        <input class="form-control"
                                               type="text"
                                               min="0.5"
                                               step="5"
                                               :disabled="qsMode()"
                                               x-model.number="solutionEntry.grams"
                                               @change="updateFields(solutionEntry, settings, 'grams');updateChart();">
                                    </template>
                                    <!-- mg_per_ml -->
                                    <template x-if="solutionEntry.input === 2">
                                        <input class="form-control"
                                               min="0.5"
                                               type="number"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="text"
                                               max="10000"
                                               step="2.5"
                                               :disabled="qsMode()"
                                               x-model.number="solutionEntry.mg_per_ml"
                                               @change="updateFields(solutionEntry, settings, 'mg_per_ml'); updateChart();">
                                    </template>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                                data-bs-toggle="dropdown">
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[0]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 0">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[1]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 1">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[2]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 2">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="d-flex flex-column">
                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                :disabled="qsMode()"
                                                @click="
                                                        solutionEntry.mls = Number(solutionEntry.mls || 0) + 2.5;
                                                        updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                    ">
                                            ▲
                                        </button>

                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                :disabled="qsMode()"
                                                @click="
                                                    solutionEntry.mls = Math.max(0.5, Number(solutionEntry.mls || 0) - 2.5);
                                                    updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                ">
                                            ▼
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    <!-- mg_per_ml -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span class="me-2 fw-semibold">Compounds</span>
                            <div class="flex-grow-1 border-bottom opacity-50"></div>
                        </div>
                        <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'mg_per_ml')"
                                  :key="solutionEntry.self_id">
                            <div>
                                <label class="me-2 fst-italic"
                                       x-text="`${solutionEntry.name}` + ' ................'"></label>

                                <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                data-bs-toggle="dropdown">
                                            ⋮
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">

                                            <li>
                                                <button class="dropdown-item text-danger"
                                                        @click="removeCompound(solutionEntry.self_id)">
                                                    Delete
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- mg_per_ml -->
                                    <template x-if="solutionEntry.input === 0">
                                        <input class="form-control"
                                               min="0"
                                               type="number"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="decimal"
                                               max="10000"
                                               step="2.5"
                                               x-model.number="solutionEntry.mg_per_ml"
                                               @change="
                                                     const val = parseFloat(solutionEntry.mg_per_ml);

                                                     if (!isNaN(val) && val >= 0.5) {
                                                       updateFields(solutionEntry, settings, 'mg_per_ml');
                                                     }

                                                     updateChart();
                                                   ">
                                    </template>
                                    <!-- purity -->
                                    <template x-if="solutionEntry.input === 2">
                                        <input class="form-control"
                                               min="0"
                                               type="number"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="decimal"
                                               max="10000"
                                               step="2.5"
                                               x-model.number="solutionEntry.purity"
                                               @change="
                                                     const val = parseFloat(solutionEntry.purity);

                                                     if (!isNaN(val) && val >= 0.5) {
                                                       updateFields(solutionEntry, settings, 'mg_per_ml');
                                                     }
                                                     updateChart();
                                                   ">
                                    </template>
                                    <!-- grams -->
                                    <template x-if="solutionEntry.input === 1">
                                        <input class="form-control"
                                               type="number"
                                               step="5"
                                               x-model.number="solutionEntry.grams"
                                               @change="updateFields(solutionEntry, settings, 'grams');updateChart();"
                                        >
                                    </template>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                                data-bs-toggle="dropdown">
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[0]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 0">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[1]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 1">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='"purity " + availableInputLabels(solutionEntry)[2]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 2">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- buggy
                                    <div class="invalid-feedback"
                                         x-text="'Range for %' + calculateSolventPercentage(compounds, settings.totalVolume) + ' solvent is ' + (estimateSaturationForCompound(solutionEntry, compounds, settings.totalVolume)[0] ?? 0)  + 'mg - ' + (estimateSaturationForCompound(solutionEntry, compounds, settings.totalVolume)[1] ?? 0) + 'mg.'  ">
                                    </div>
                                    -->
                                </div>
                            </div>
                        </template>
                        <div class="input-group">
                            <div x-show="settings.remainingVolume < 0"
                                 class="alert alert-danger" role="alert">
                                ⚠️ <strong>
                                <span x-text="Math.abs(settings.remainingVolume).toFixed(2)"></span> mL over volume
                            </strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-lg-4 mt-2">

            <div class="border rounded pb-3">
                <div class="p-2  border-warning-subtle bg-warning-subtle">
                    <h4 class="fw-bold text-center">Batch Totals</h4>
                </div>
                <template x-for="solutionMeasurement in solutionMeasurements" :key="solutionMeasurement.id">

                    <div>

                        <!-- ===================== COMPOUNDS ===================== -->
                        <template x-for="(compound, index) in solutionMeasurement.compounds" :key="compound.id">

                            <div
                                    class="p-2 mt-2 mb-0 "
                                    :class="index % 2 === 0 ? 'bg-body-tertiary' : 'bg-body'"
                            >

                                <!-- Compound Name -->
                                <template x-if="compound.basis === 'mg_per_ml'">
                                    <div class="d-flex align-items-center mb-2 fst-italic">

                                        <!-- Left: name -->
                                        <span x-text="compound.name"></span>

                                        <!-- Middle: flexible dotted line -->
                                        <span class="flex-grow-1 mx-2 border-bottom border-dotted"></span>

                                        <!-- Right: value -->
                                        <span
                                                x-text="'(' +
                                                    (isNaN(compound.purity)
                                                        ? '0.00'
                                                        : Number(compound.purity).toFixed(2)
                                                    ) +
                                                    ' %)'
                                                "
                                        ></span>

                                    </div>
                                </template>

                                <template x-if="compound.basis !== 'mg_per_ml'">
                                    <div class="d-flex align-items-center mb-2 fst-italic">

                                        <!-- Left: name -->
                                        <span x-text="compound.name"></span>

                                        <!-- Middle: flexible dotted line -->
                                        <span class="flex-grow-1 mx-2 border-bottom border-dotted"></span>

                                        <!-- Right: value -->
                                        <span
                                                x-text="
                                                        '(' +
                                                        (isNaN(compound.v_v_percent)
                                                            ? '0.00'
                                                            : Number(compound.v_v_percent).toFixed(2)
                                                        ) +
                                                        ' % v.v)'
                                                    "
                                        ></span>

                                    </div>
                                </template>

                                <!-- Weight -->
                                <div class="d-flex justify-content-between small">
                                    <span>Weight</span>
                                    <span>
                        <span
                                x-text="
                                            (isNaN(compound.v_v_percent)
                                                ? '0.00'
                                                : Number(compound.v_v_percent).toFixed(2)
                                            ) + ' gm'
                                        "
                        ></span>
                    </span>
                                </div>

                                <!-- Viscosity -->
                                <template x-if="compound.basis !== 'mg_per_ml'">
                                    <div class="d-flex justify-content-between small">
                                        <span>Viscosity</span>
                                        <span x-text="compound.viscosityArray[0] + ' cP'"></span>
                                    </div>
                                </template>

                                <!-- Volume / Displacement -->
                                <div class="d-flex justify-content-between small">
                                    <template x-if="compound.basis === 'mg_per_ml'">
                                        <span>Displacement</span>
                                    </template>
                                    <template x-if="compound.basis !== 'mg_per_ml'">
                                        <span>Volume</span>
                                    </template>

                                    <span>
                        <span
                                x-text="
                                (isNaN(compound.mls)
                                    ? '0.00'
                                    : Number(compound.mls).toFixed(2)
                                ) + ' ml'
                            "
                        ></span>
                    </span>
                                </div>
                            </div>
                        </template>

                        <!-- ===================== TOTALS ===================== -->
                        <div class="p-2 mt-2 mb-0  bg-warning-subtle">                            <div class="fw-bold mb-2">Batch Totals</div>

                            <div class="d-flex justify-content-between">
                                <span>Total Displacement</span>
                                <span
                                        x-text="calculateBatchTotals(solutionMeasurement.compounds).mls.toFixed(2) + ' ml'"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span>Total Weight</span>
                                <span
                                        x-text="calculateBatchTotals(solutionMeasurement.compounds).grams.toFixed(2) + ' gm'"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span>Filter Time</span>
                                <span
                                        x-text="solutionMeasurement.filterTime.toFixed(2) + ' minutes'"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span>Excipients Avg Viscosity</span>
                                <span
                                        x-text="solutionMeasurement.viscosity.toFixed(2) + ' cP'"
                                ></span>
                            </div>
                        </div>
                    </div>
                </template>
                <br/>
                <button @click='downloadBatchText()' class="btn btn-sm btn-secondary">
                    Download Batch 💾
                </button>
            </div>
        </div>
    </div>

</div>
</body>
</html>
