<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Solution Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script src="./scripts/app.js"></script>
    <script src="./scripts/compounds.js"></script>
    <script src="./scripts/chartSettings.js"></script>
    <script src="./scripts/maths.js"></script>
    <script src="./scripts/constants.js"></script>
    <script src="./scripts/recipes.js"></script>
    <script src="./scripts/i18n.js"></script>

    <!-- Load Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>

    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" href="favicon.ico">

    <!-- Load Excel Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"
            integrity="sha512-UnrKxsCMN9hFk7M56t4I4ckB4N/2HHi0w/7+B/1JsXIX3DmyBcsGpT3/BsuZMZf+6mAr0vP81syWtfynHJ69JA=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"
            integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
</head>
<body class="container-fluid " x-data="compoundApp()" x-init="init(); updateChart();" :data-bs-theme="settings.theme">
<div>
    <h2 class="title text-center">
        <span x-text="translations.title[settings.currentLanguage]"></span>
        <button
                class="btn"
                @click="changeTheme()"
        >
        <span x-text="settings.theme === 'light'
              ? '🌙 ' + (translations.darkMode[settings.currentLanguage] || 'Dark Mode')
              : '☀️ ' +  (translations.lightMode[settings.currentLanguage] || 'Light Mode')">
</span>
        </button>
    </h2>
    <div class="row">
        <!-------------------------------------- Chart --------------------------------------------------------->
        <div class="col-12 col-md-6 col-lg-4 mb-2 ">
            <div class="border rounded">
                <!-------------------------------------- Chart  --------------------------------------->
                <div style="position: relative;">
                    <canvas id="myChart"></canvas>
                </div>


                <!-------------------------------------- Palette Select  --------------------------------------->
                <div class=" p-3 mb-2 ">
                    <div class="input-group mb-1 col-12 col-md-4 col-lg-3">
                        <div class="input-group-prepend">
                            <span x-text='translations.palette[settings.currentLanguage] +  " 🎨"'
                                  class="input-group-text" id=""></span>
                        </div>
                        <select
                                class="form-select w-25 mb-3 rounded"
                                x-model="settings.selectedPalette"
                                @change="changePalette()"
                        >
                            <option value="nature">Nature</option>
                            <option value="ocean">Ocean</option>
                            <option value="sunset">Sunset</option>
                            <option value="neon">Neon</option>
                            <option value="unique">Unique</option>

                        </select>

                        <template x-for="color in colours">
                            <div
                                    style="width:60px;height:60px;display:inline-block;margin:5px;border-radius:8px"
                                    :style="`background:${color}`"
                            ></div>
                        </template>

                    </div>
                    <!-- Language Selector -->
                    <div class="input-group mb-1 col-12 col-md-4 col-lg-3">
                        <div class="input-group-prepend">
                            <span x-text="translations.language_label[settings.currentLanguage] + ' 🌐'"
                                  class="input-group-text" id=""></span>
                        </div>
                        <select class="form-select w-25 mb-3 rounded"
                                x-model="settings.currentLanguage"
                                @change="changeLanguage()">

                            <template x-for="language in availableLanguages">
                                <option :value="language.code" :selected="language.code === settings.currentLanguage">
                                    <span x-text="language.name"></span>
                                </option>
                            </template>

                        </select>

                    </div>

                    <template x-if="settings.solventPercentage !== 0">
                        <div>
                            <span class="small"
                                  x-text="translations.viscosity[settings.currentLanguage] + ' ' + ((settings.viscosity ?? 0).toFixed()) + ' cP'">
                            </span>
                            <div class="progress mb-1" style="height: 20px;">
                                <div class="progress-bar progress-bar-striped"
                                     :class="{
                                          'bg-danger': settings.viscosityRating <= 25,
                                          'bg-warning': settings.viscosityRating > 25 && settings.viscosityRating <= 50,
                                          'bg-info': settings.viscosityRating > 50 && settings.viscosityRating <= 75,
                                          'bg-success': settings.viscosityRating > 75
                                       }"
                                     :style="`width: ${settings.viscosityRating ?? 0}%`"
                                     role="progressbar"
                                     aria-valuemin="0"
                                     aria-valuemax="100">
                                </div>
                            </div>
                        </div>
                    </template>
                    <template x-if="settings.solventPercentage !== 0">
                        <div>
                            <span class="small"
                                  x-text="translations.solvents[settings.currentLanguage] + ' ' + (settings.solventPercentage.toFixed()) + ' % v.v'"></span>
                            <div class="progress mb-1" style="height: 20px;">
                                <div class="progress-bar progress-bar-striped"
                                     :class="{
                      'bg-danger': settings.solventPercentageRating <= 25,
                      'bg-warning': settings.solventPercentageRating > 25 && settings.solventPercentageRating <= 50,
                      'bg-info': settings.solventPercentageRating > 50 && settings.solventPercentageRating <= 75,
                      'bg-success': settings.solventPercentageRating > 75
                   }"
                                     :style="`width: ${settings.solventPercentageRating}%`"
                                     role="progressbar"
                                     aria-valuemin="0"
                                     aria-valuemax="100">
                                </div>
                            </div>
                        </div>
                    </template>
                    <div class="hr"></div>

                </div>
                <!--------------------------------------- Blurb --------------------------------->

                <template x-if="typeof getRecipeBlurb !== 'undefined'">
                    <div class="m-2 p-1 text-wrap fst-italic">
                        <div class="border-start border-3 border-secondary ps-3 fst-italic" x-html="getRecipeBlurb"></div>
                        <template x-if="typeof getRecipeSource !== 'undefined'">
                            <div>
                                <small >
                                    <a
                                            :href="getRecipeSource"
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            class="text-decoration-none"
                                    >
                                        View Reference
                                    </a>
                                </small>
                            </div>
                        </template>
                    </div>
                </template>
                <!--------------------------------------- Select Recipe --------------------------------->
                <div class="p-2 row">
                    <div class="d-flex gap-2">
                        <select
                                class="form-select"
                                x-model="settings.selectedRecipeId"
                                @change="updateRecipe();"
                        >
                            <option x-text="translations.load_recipe[settings.currentLanguage] + ' 👨‍🍳🍽️'"
                                    value=""></option>
                            <template
                                    x-for="(recipeItem, index) in settings.recipes"
                                    :key="index">
                                <option
                                        :disabled="settings.compounds.some(c => c.index === index)"
                                        :value="index"
                                        :selected="settings.selectedRecipeId === index"
                                        x-text="recipeItem.name">
                                </option>
                            </template>
                        </select>

                    </div>
                </div>


                <!--------------------------------------- Drop down form control --------------------------------->
                <div class="p-2 row">
                    <div class="d-flex gap-2">
                        <select
                                class="form-select"
                                x-model="settings.addRowSelectedCompoundId"
                                @change="addCompoundRow('excipient'); settings.addRowSelectedCompoundId = '';updateChart();"
                        >
                            <option x-text="translations.add_excipient[settings.currentLanguage] + ' 🍶'"
                                    value=""></option>
                            <template
                                    x-for="compound in compounds.filter(c => c.basis !== 'mg_per_ml')"
                                    :key="compound.self_id"
                            >
                                <option
                                        :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                        :value="compound.self_id"
                                        x-text="compound.translations?.[settings.currentLanguage] || compound.name">
                                </option>
                            </template>
                        </select>
                        <select
                                class="form-select"
                                x-model="settings.addRowSelectedCompoundId"
                                @change="addCompoundRow('ingredient'); settings.addRowSelectedCompoundId = '';updateChart();"
                        >
                            <option x-text="translations.add_compound[settings.currentLanguage] + ' 🥣'"
                                    value=""></option>

                            <template
                                    x-for="compound in compounds.filter(c => c.basis === 'mg_per_ml')"
                                    :key="compound.self_id"
                            >
                                <option
                                        :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                        :value="compound.self_id"
                                        x-text="compound.translations?.[settings.currentLanguage] || compound.name">
                                </option>
                            </template>
                        </select>
                        <!--
                        <button class="btn btn-outline-secondary"
                                @click="anaylseBatch()">Analyse
                        </button>
                        -->
                    </div>
                </div>
            </div>
        </div>
        <!-------------------------------------- Formulation Control Col --------------------------------------->
        <div class="col-12 col-md-6 col-lg-4 mb-2">
            <div class="border rounded pb-3 p-2">
                <!-- Formulation Control -->
                <div>
                    <!-- Volume -->
                    <div class="input-group mb-1">
                        <div class="input-group-prepend">
                            <span x-text="translations.finished_volume[settings.currentLanguage] + ' ⚗️'"
                                  class="input-group-text" id=""></span>
                        </div>
                        <!-- mL -->
                        <input class="form-control rounded col-3"
                               type="number"
                               min="0"
                               step="5"
                               x-model.number="settings.totalVolume"
                               @change="updateVolume(settings.totalVolume, settings.compounds); updateChart();"
                        >
                        <!-- v_v_percent -->
                        <div class="input-group-append">
                            <span class="input-group-text">mL</span>
                        </div>

                    </div>
                    <!-- Compounds Entry Group-->
                    <!-- v_v_percent -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span x-text="translations.solvents[settings.currentLanguage]"
                                  class="me-2 fw-semibold"></span>
                            <div class="flex-grow-1 border-bottom"></div>
                        </div>
                        <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'v_v_percent')"
                                  :key="solutionEntry.self_id">
                            <div>
                                <label class="me-2 fst-italic"
                                       x-text="`${solutionEntry.translations?.[settings.currentLanguage] || solutionEntry.name}` + ' ................'"></label>
                                <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                data-bs-toggle="dropdown">
                                            ⋮
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button x-text="translations.buttons.delete[settings.currentLanguage]"
                                                        class="dropdown-item text-danger"
                                                        @click="removeCompound(solutionEntry.self_id)">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- mL -->
                                    <template x-if="solutionEntry.input === 1">
                                        <input class="form-control rounded "
                                               type="text"
                                               min="0.5"
                                               step="2.5"
                                               x-model.number="solutionEntry.mls"
                                               @change="updateFields(solutionEntry, settings, 'mls');updateChart();"
                                        >
                                    </template>
                                    <!-- v_v_percent -->
                                    <template x-if="solutionEntry.input === 0">
                                        <input :class="checkSolvents(solutionEntry, compounds, settings.totalVolume) + ' form-control rounded '"
                                               type="text"
                                               min="0.5"
                                               max="100"
                                               step="2.5"
                                               x-model.number="solutionEntry.v_v_percent"
                                               @change="updateFields(solutionEntry, settings, 'v_v_percent'); updateChart();"
                                        >
                                    </template>
                                    <!-- mg_per_ml -->
                                    <template x-if="solutionEntry.input === 2">
                                        <input class="form-control rounded"
                                               min="0.5"
                                               type="text"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="decimal"
                                               max="10000"
                                               step="2.5"
                                               x-model.number="solutionEntry.mg_per_ml"
                                               @change="updateFields(solutionEntry, settings, 'mg_per_ml'); updateChart();"
                                        >
                                    </template>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                                data-bs-toggle="dropdown">
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[0]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 0">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[1]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 1">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[2]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 2">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="d-flex flex-column">
                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                @click="
                                                        solutionEntry.mls = Number(solutionEntry.mls || 0) + 2.5;
                                                        updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                    ">
                                            ▲
                                        </button>

                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                @click="
                                                    solutionEntry.mls = Math.max(0.5, Number(solutionEntry.mls || 0) - 2.5);
                                                    updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                ">
                                            ▼
                                        </button>
                                    </div>
                                    <template x-if="solutionEntry.self_id === 'benzyl_alcohol' ">
                                        <div class="invalid-feedback"
                                             x-text="translations.message_ba[settings.currentLanguage]"></div>
                                    </template>
                                    <template x-if="solutionEntry.self_id === 'benzyl_benzoate' ">
                                        <div class="invalid-feedback"
                                             x-text="translations.message_bb[settings.currentLanguage]"></div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                    <!-- q.s. -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span x-text="translations.excipients[settings.currentLanguage]"
                                  class="me-2 fw-semibold"></span>
                            <div class="flex-grow-1 border-bottom"></div>
                        </div>
                        <template
                                x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'q.s.')"
                                :key="solutionEntry.self_id">
                            <div>
                                <label class="me-2 fst-italic"
                                       x-text="((solutionEntry.translations?.[settings.currentLanguage] || solutionEntry.name) + (solutionEntry.qsMode ? ' q.s.' : '')) + ' ................'">
                                </label>
                                <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                data-bs-toggle="dropdown">
                                            ⋮
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <!--
                                                <button class="dropdown-item text-danger"
                                                        @click="toggleQS(solutionEntry.self_id)">
                                                    q.s.
                                                    <span x-text="solutionEntry.qsMode ? 'off' : 'on'"></span>
                                                </button>
                                                -->
                                                <button x-text="translations.buttons.delete[settings.currentLanguage]"
                                                        class="dropdown-item text-danger"
                                                        @click="removeCompound(solutionEntry.self_id)">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- mL -->
                                    <template x-if="solutionEntry.input === 0">
                                        <input class="form-control rounded"
                                               type="text"
                                               min="0.5"
                                               step="5"
                                               :disabled="qsMode()"
                                               x-model.number="solutionEntry.mls"
                                               @change="updateFields(solutionEntry, settings, 'mls');updateChart();"
                                        >

                                    </template>
                                    <!-- grams -->
                                    <template x-if="solutionEntry.input === 1">

                                        <input class="form-control rounded"
                                               type="text"
                                               min="0.5"
                                               step="5"
                                               :disabled="qsMode()"
                                               x-model.number="solutionEntry.grams"
                                               @change="updateFields(solutionEntry, settings, 'grams');updateChart();">
                                    </template>
                                    <!-- mg_per_ml -->
                                    <template x-if="solutionEntry.input === 2">
                                        <input class="form-control rounded"
                                               min="0.5"
                                               type="number"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="text"
                                               max="10000"
                                               step="2.5"
                                               :disabled="qsMode()"
                                               x-model.number="solutionEntry.mg_per_ml"
                                               @change="updateFields(solutionEntry, settings, 'mg_per_ml'); updateChart();">
                                    </template>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                                data-bs-toggle="dropdown">
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[0]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 0">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[1]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 1">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[2]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 2">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="d-flex flex-column">
                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                :disabled="qsMode()"
                                                @click="
                                                        solutionEntry.mls = Number(solutionEntry.mls || 0) + 2.5;
                                                        updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                    ">
                                            ▲
                                        </button>

                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary py-0 px-2"
                                                style="font-size:1rem; line-height:1;"
                                                :disabled="qsMode()"
                                                @click="
                                                    solutionEntry.mls = Math.max(0.5, Number(solutionEntry.mls || 0) - 2.5);
                                                    updateFields(solutionEntry, settings, 'mls');    updateChart();
                                                ">
                                            ▼
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    <!-- mg_per_ml -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span x-text="translations.compounds[settings.currentLanguage]"
                                  class="me-2 fw-semibold"></span>
                            <div class="flex-grow-1 border-bottom opacity-50"></div>
                        </div>
                        <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'mg_per_ml')"
                                  :key="solutionEntry.self_id">
                            <div>
                                <label class="me-2 fst-italic"
                                       x-text="`${solutionEntry.translations?.[settings.currentLanguage] || solutionEntry.name}` + ' ................'"></label>

                                <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                data-bs-toggle="dropdown">
                                            ⋮
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">

                                            <li>
                                                <button x-text="translations.buttons.delete[settings.currentLanguage]"
                                                        class="dropdown-item text-danger"
                                                        @click="removeCompound(solutionEntry.self_id)">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- mg_per_ml -->
                                    <template x-if="solutionEntry.input === 0">
                                        <input class="form-control rounded"
                                               min="0"
                                               type="number"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="decimal"
                                               max="10000"
                                               step="2.5"
                                               x-model.number="solutionEntry.mg_per_ml"
                                               @change="
                                                     const val = parseFloat(solutionEntry.mg_per_ml);

                                                     if (!isNaN(val) && val >= 0.5) {
                                                       updateFields(solutionEntry, settings, 'mg_per_ml');
                                                     }

                                                     updateChart();
                                                   ">
                                    </template>
                                    <!-- purity -->
                                    <template x-if="solutionEntry.input === 2">
                                        <input class="form-control rounded"
                                               min="0"
                                               type="number"
                                               :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                               inputmode="decimal"
                                               max="100"
                                               step="2.5"
                                               x-model.number="solutionEntry.purity"
                                               @change="
                                                     const val = verifyPercentage(solutionEntry.purity);
                                                     solutionEntry.purity = val;
                                                     updateFields(solutionEntry, settings, 'purity');
                                                     updateChart();
                                                   ">
                                    </template>
                                    <!-- grams -->
                                    <template x-if="solutionEntry.input === 1">
                                        <input class="form-control rounded"
                                               type="number"
                                               step="5"
                                               x-model.number="solutionEntry.grams"
                                               @change="updateFields(solutionEntry, settings, 'grams');updateChart();"
                                        >
                                    </template>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                type="button"
                                                x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                                data-bs-toggle="dropdown">
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[0]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 0">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[1]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 1">
                                                </button>
                                            </li>
                                            <li>
                                                <button x-text='"purity " + availableInputLabels(solutionEntry)[2]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 2">
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                    <!-- buggy
                                    <div class="invalid-feedback"
                                         x-text="'Range for %' + calculateSolventPercentage(compounds, settings.totalVolume) + ' solvent is ' + (estimateSaturationForCompound(solutionEntry, compounds, settings.totalVolume)[0] ?? 0)  + 'mg - ' + (estimateSaturationForCompound(solutionEntry, compounds, settings.totalVolume)[1] ?? 0) + 'mg.'  ">
                                    </div>
                                    -->
                                </div>
                            </div>
                        </template>
                        <div class="input-group">
                            <div x-show="settings.remainingVolume < 0"
                                 class="alert alert-danger" role="alert">
                                ⚠️ <strong>
                                <span x-text="Math.abs(settings.remainingVolume).toFixed(4)"></span> mL over volume
                            </strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-------------------------------------- Batch --------------------------------------------------------->
        <div class="col-12 col-lg-4">
            <div class="border rounded pb-2">
                <div class="p-2  bg-warning-subtle border-bottom">
                    <h4 class="fw-bold text-center"><span
                            x-text="translations.batch_totals[settings.currentLanguage]"></span>
                        <template x-if="typeof settings.selectedRecipeId !== 'undefined'">
                            <span x-text="' - ' + settings.recipes[settings.selectedRecipeId].name"></span>
                        </template>
                    </h4>
                </div>
                <template x-for="solutionMeasurement in solutionMeasurements" :key="solutionMeasurement.id">
                    <div>
                        <!-- ===================== COMPOUNDS ===================== -->
                        <template x-for="(compound, index) in solutionMeasurement.compounds" :key="compound.id">

                            <div
                                    class="p-2 mb-0 "
                                    :class="index % 2 === 0 ? 'bg-body-tertiary' : 'bg-body'"
                            >
                                <!-- Compound Name -->
                                <template x-if="compound.basis === 'mg_per_ml'">
                                    <div class="d-flex align-items-center mb-2 fst-italic">
                                        <!-- Left: name -->
                                        <span x-text="compound.translations?.[settings.currentLanguage] || compound.name"></span>
                                        <!-- Middle: flexible dotted line -->
                                        <span class="flex-grow-1 mx-2 border-bottom border-dotted"></span>
                                        <!-- Right: value -->
                                        <span
                                                x-text=" +
                                                    (isNaN(compound.purity)
                                                        ? '0.00'
                                                        : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.purity).toFixed(4))
                                                    ) + '% ' + translations.purity[settings.currentLanguage]"
                                        ></span>
                                    </div>
                                </template>

                                <!-- Compound name other -->
                                <template x-if="compound.basis !== 'mg_per_ml'">
                                    <div class="d-flex align-items-center mb-2 fst-italic">

                                        <!-- Left: name -->
                                        <span x-text="compound.translations?.[settings.currentLanguage] || compound.name"></span>

                                        <!-- Middle: flexible dotted line -->
                                        <span class="flex-grow-1 mx-2 border-bottom border-dotted"></span>

                                        <!-- Right: value -->
                                        <span
                                                x-text="
                                                        (isNaN(compound.v_v_percent)
                                                            ? '0.00'
                                                            : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.v_v_percent).toFixed(4))
                                                        ) +
                                                        '% v/v'"
                                        ></span>

                                    </div>
                                </template>
                                <!-- Compound mg/mL -->
                                <template x-if="compound.basis !== 'q.s.'">
                                    <div class="d-flex justify-content-between small">
                                        <span x-text="translations.concentration[settings.currentLanguage]"></span>
                                        <span
                                                x-text="(isNaN(compound.mg_per_ml)
                                                        ? '0.00'
                                                        : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.mg_per_ml).toFixed(4))
                                                    ) +
                                                    ' mg/mL'"
                                        ></span>
                                    </div>
                                </template>

                                <!-- Viscosity -->
                                <template x-if="compound.basis !== 'mg_per_ml'">
                                    <div class="d-flex justify-content-between small">
                                        <span x-text="translations.viscosity[settings.currentLanguage]"></span>
                                        <span x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.viscosityArray[0]).toFixed(4)) + ' cP'"></span>
                                    </div>
                                </template>

                                <!-- Volume / Displacement -->
                                <div class="d-flex justify-content-between small">
                                    <template x-if="compound.basis === 'mg_per_ml'">
                                        <span x-text="translations.displacement[settings.currentLanguage]"></span>
                                    </template>
                                    <template x-if="compound.basis !== 'mg_per_ml'">
                                        <span x-text="translations.volume[settings.currentLanguage]"></span>
                                    </template>

                                    <span>
                                        <span
                                                x-text="
                                                (isNaN(compound.mls)
                                                    ? '0.00'
                                                    : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.mls).toFixed(4))
                                                ) + ' ml'
                                            "
                                        ></span>
                                     </span>
                                </div>
                                <!-- Melting point -->
                                <template
                                        x-if="compound.basis === 'mg_per_ml' && compound.melting_point && !isNaN(compound.melting_point[0])">
                                    <div class="d-flex justify-content-between small">
                                        <span x-text="translations.melting_point[settings.currentLanguage]"></span>
                                        <span
                                                x-text="
                                                    new Intl.NumberFormat([settings.currentLanguage, 'en'])
                                                        .format(Number(compound.melting_point[0]).toFixed(4))
                                                    + ' C'
                                                "
                                        ></span>
                                    </div>
                                </template>
                                <!-- Weight -->
                                <div class="d-flex justify-content-between small">
                                    <span x-text="translations.weight[settings.currentLanguage]"></span>
                                    <span
                                            x-text="
                                                        (isNaN(compound.grams)
                                                            ? '0.00'
                                                            : new Intl.NumberFormat([settings.currentLanguage, 'en']).format(Number(compound.grams).toFixed(4))
                                                        ) + ' gm'
                                                    "
                                    ></span>
                                </div>

                            </div>
                        </template>

                        <!-- ===================== TOTALS ===================== -->
                        <div class="p-2 bg-warning-subtle border-bottom">
                            <div x-text="translations.batch_totals[settings.currentLanguage]"
                                 class="fw-bold mb-2"></div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.total_displacement[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(calculateBatchTotals(solutionMeasurement.compounds).mls.toFixed(4)) + ' ml'"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.total_weight[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(calculateBatchTotals(solutionMeasurement.compounds).grams.toFixed(4)) + ' gm'"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.filter_time[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(solutionMeasurement.filterTime.toFixed(4)) + ' ' + translations.minutes[settings.currentLanguage]"
                                ></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span x-text="translations.excip_viscosity[settings.currentLanguage]"></span>
                                <span
                                        x-text="new Intl.NumberFormat([settings.currentLanguage, 'en']).format(solutionMeasurement.viscosity.toFixed(4)) + ' cP'"
                                ></span>
                            </div>
                        </div>
                    </div>
                </template>
                <br/>
                <div class=" ">
                    <button x-text="translations.buttons.download_batch[settings.currentLanguage] + ' 📄'"
                            @click='downloadBatchText("txt")' class="m-1 btn btn-sm btn-secondary">
                    </button>

                    <button x-text="translations.buttons.download_pricing[settings.currentLanguage] + ' 📊'"
                            @click='downloadBatchText("xls")' class="m-1 btn btn-sm btn-secondary">
                    </button>

                    <template x-if="solutionMeasurements[0].compounds.find(s => s.parent_molecule === 'testosterone')">
                        <div>
                            <button x-text="translations.buttons.product_insert[settings.currentLanguage] + ' 📑'"
                                    @click='generateProductInsertUrl()' class="m-1 btn btn-sm btn-secondary">
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
