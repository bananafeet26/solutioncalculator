<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script src="./scripts/app.js"></script>
    <script src="./scripts/compounds.js"></script>
    <script src="./scripts/chartSettings.js"></script>
    <script src="./scripts/maths.js"></script>
    <script src="./scripts/constants.js"></script>
    <script src="./scripts/recipes.js"></script>

    <!-- Load Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>

    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<div class="container-fluid " x-data="compoundApp()" x-init="init(); updateChart();" :class="theme">
    <div class="border rounded p-2 mb-2 row">
        <h2 class="title text-center">
            <span>Formulation Calculator</span>
        </h2>
        <!-------------------------------------- Graphing System Col ------------------------------------------->

        <div class="col-lg">
            <div class="border rounded">
                <!-------------------------------------- Chart  --------------------------------------->
                <canvas style="max-height: 45vh" id="myChart"></canvas>
                <!-------------------------------------- Dynamic Ratings  --------------------------------------->
                <div class=" rounded p-3 mb-2 row">
                    <div class="progress mb-1" style="height: 20px;">
                        <div class="progress-bar "
                             :class="{
              'bg-danger': settings.viscosityRating <= 25,
              'bg-warning': settings.viscosityRating > 25 && settings.viscosityRating <= 50,
              'bg-info': settings.viscosityRating > 50 && settings.viscosityRating <= 75,
              'bg-success': settings.viscosityRating > 75
           }"
                             :style="`width: ${settings.viscosityRating}%`"
                             role="progressbar"
                             aria-valuemin="0"
                             aria-valuemax="100">
                            <span x-text="'Viscosity ' + settings.viscosity.toFixed() + ' cP'"></span>
                        </div>
                    </div>
                    <div class="progress mb-1" style="height: 20px;">
                        <div class="progress-bar "
                             :class="{
              'bg-danger': settings.solventPercentageRating <= 25,
              'bg-warning': settings.solventPercentageRating > 25 && settings.solventPercentageRating <= 50,
              'bg-info': settings.solventPercentageRating > 50 && settings.solventPercentageRating <= 75,
              'bg-success': settings.solventPercentageRating > 75
           }"
                             :style="`width: ${settings.solventPercentageRating}%`"
                             role="progressbar"
                             aria-valuemin="0"
                             aria-valuemax="100">
                            <span x-text="'Solvents ' + (settings.solventPercentage.toFixed()) + ' % v.v'"></span>
                        </div>
                    </div>
                    <div class="hr"></div>


                </div>
                <!--------------------------------------- Select Recipe --------------------------------->
                <div class="p-2 row">
                    <div class="d-flex gap-2">
                        <select
                                class="form-select"
                                x-model="settings.selectedRecipeId"
                                @change="updateRecipe()"
                        >
                            <option value="">Load Recipe</option>
                            <template x-for="(recipe, index) in recipes" :key="index">
                                <option :text="recipe.name" :value="index"><span x-text="recipe.name"></span></option>

                            </template>
                        </select>

                    </div>
                </div>
                <!--------------------------------------- Drop down form control --------------------------------->
                <div class="p-2 row">
                    <div class="d-flex gap-2">
                        <select
                                class="form-select"
                                x-model="settings.addRowSelectedCompoundId"
                                @change="addCompoundRow(); settings.addRowSelectedCompoundId = '';"
                        >
                            <option value="">Add excipient</option>
                            <template
                                    x-for="compound in compounds.filter(c => c.basis !== 'mg_per_ml')"
                                    :key="compound.self_id"
                            >
                                <option
                                        :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                        :value="compound.self_id"
                                        x-text="compound.name">
                                </option>
                            </template>
                        </select>
                        <select
                                class="form-select"
                                x-model="settings.addRowSelectedCompoundId"
                                @change="addCompoundRow(); settings.addRowSelectedCompoundId = '';"
                        >
                            <option value="">Add compound</option>
                            <template
                                    x-for="compound in compounds.filter(c => c.basis === 'mg_per_ml')"
                                    :key="compound.self_id"
                            >
                                <option
                                        :disabled="settings.compounds.some(c => c.self_id === compound.self_id)"
                                        :value="compound.self_id"
                                        x-text="compound.name">
                                </option>
                            </template>
                        </select>
                        <button class="btn btn-outline-primary"
                                @click="anaylseBatch()">Analyse
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-------------------------------------- Formulation Control Col --------------------------------------->
        <div class="col-lg">
            <div class="border rounded p-2 row">
                <!-- Formulation Control -->
                <div x-effect="updateChart()" x-on:change="updateChart()">
                    <!-- Volume -->
                    <div class="input-group mb-1 col-12 col-md-4 col-lg-3">
                        <div class="input-group-prepend">
                            <span x-text="'Finished Volume'" class="input-group-text" id=""></span>
                        </div>
                        <!-- mL -->
                        <input class="form-control col-3"
                               type="number"
                               min="0"
                               step="5"
                               x-model.number="settings.totalVolume"
                               @input="updateVolume(settings.totalVolume, settings.compounds); updateChart();"
                               @blur="settings.totalVolume = parseFloat(settings.totalVolume.toFixed(2))"
                        >
                        <!-- v_v_percent -->
                        <div class="input-group-append">
                            <span class="input-group-text">mL</span>
                        </div>

                    </div>
                    <!-- Compounds Entry Group-->
                    <!-- v_v_percent -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span class="me-2 fw-semibold">Solvents</span>
                            <div class="flex-grow-1 border-bottom"></div>
                        </div>
                        <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'v_v_percent')"
                                  :key="solutionEntry.self_id">
                            <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                <div class="dropdown">
                                    <button class="btn btn-outline-primary dropdown-toggle"
                                            type="button"
                                            x-text="settings.isSmall
                              ? solutionEntry.name.slice(0, 9) + '...'
                              : solutionEntry.name"
                                            data-bs-toggle="dropdown">
                                        ⋮
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button class="dropdown-item text-danger"
                                                    @click="removeCompound(solutionEntry.self_id)">
                                                Delete
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <!-- mL -->
                                <template x-if="solutionEntry.input === 1">
                                    <input class="form-control "
                                           type="number"
                                           min="0"
                                           step="2.5"
                                           x-model.number="solutionEntry.mls"
                                           @input="updateFields(solutionEntry, settings, 'mls');"
                                           @blur="solutionEntry.mls = parseFloat(solutionEntry.mls.toFixed(2))"
                                    >
                                </template>
                                <!-- v_v_percent -->
                                <template x-if="solutionEntry.input === 0">
                                    <input :class="checkSolvents(solutionEntry, compounds, settings.totalVolume) + ' form-control '"
                                           type="number"
                                           min="0"
                                           max="100"
                                           step="2.5"
                                           x-model.number="solutionEntry.v_v_percent"
                                           @input="updateFields(solutionEntry, settings, 'v_v_percent')"
                                           @blur="solutionEntry.v_v_percent = parseFloat(solutionEntry.v_v_percent.toFixed(2))"
                                    >
                                </template>
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                            data-bs-toggle="dropdown">
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[0]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 0">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[1]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 1">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <template x-if="solutionEntry.self_id === 'benzyl_alcohol' ">
                                    <div class="invalid-feedback" x-text="'Recommended BA range: 1.2%-5% v.v'"></div>
                                </template>
                                <template x-if="solutionEntry.self_id === 'benzyl_benzoate' ">
                                    <div class="invalid-feedback" x-text="'Recommended BB range: 0%-50% v.v'"></div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <!-- q.s. -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span class="me-2 fw-semibold">Excipients</span>
                            <div class="flex-grow-1 border-bottom"></div>
                        </div>
                        <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'q.s.')"
                                  :key="solutionEntry.self_id">
                            <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                <div class="dropdown">
                                    <button class="btn btn-outline-primary dropdown-toggle"
                                            type="button"
                                            x-text="settings.isSmall
                              ? solutionEntry.name.slice(0, 9) + '...'
                              : solutionEntry.name"
                                            data-bs-toggle="dropdown">
                                        ⋮
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button class="dropdown-item text-danger"
                                                    @click="removeCompound(solutionEntry.self_id)">
                                                Delete
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <!-- mL -->
                                <template x-if="solutionEntry.input === 0">
                                    <input class="form-control"
                                           type="number"
                                           min="0"
                                           step="5"
                                           x-model.number="solutionEntry.mls"
                                           @input="updateFields(solutionEntry, settings, 'mls');"
                                           @blur="solutionEntry.mls = parseFloat(solutionEntry.mls.toFixed(2))"
                                    >

                                </template>
                                <!-- grams -->
                                <template x-if="solutionEntry.input === 1">

                                    <input class="form-control"
                                           type="number"
                                           step="5"
                                           x-model.number="solutionEntry.grams"
                                           @input="updateFields(solutionEntry, settings, 'grams');"
                                           @blur="solutionEntry.grams = parseFloat(solutionEntry.grams.toFixed(2))"
                                    >
                                </template>
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                            data-bs-toggle="dropdown">
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[0]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 0">
                                            </button>
                                        </li>
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[1]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 1">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </template>
                    </div>
                    <!-- mg_per_ml -->
                    <div class="form-group">
                        <div class="d-flex align-items-center my-3">
                            <span class="me-2 fw-semibold fs-6 text-muted">Compounds</span>
                            <div class="flex-grow-1 border-bottom opacity-50"></div>
                        </div>
                        <template x-for="solutionEntry in settings.compounds.filter(c => c.basis === 'mg_per_ml')"
                                  :key="solutionEntry.self_id">
                            <div class="input-group mb-1 col-6 col-md-4 col-lg-3">
                                <div class="dropdown">
                                    <button class="btn btn-outline-primary dropdown-toggle"
                                            type="button"
                                            x-text="settings.isSmall
                              ? solutionEntry.name.slice(0, 9) + '...'
                              : solutionEntry.name"
                                            data-bs-toggle="dropdown">
                                        ⋮
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button class="dropdown-item text-danger"
                                                    @click="removeCompound(solutionEntry.self_id)">
                                                Delete
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <!-- grams -->
                                <template x-if="solutionEntry.input === 1 || isHuge ">
                                    <input class="form-control"
                                           :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                           type="number"
                                           min="0"
                                           step="5"
                                           x-model.number="solutionEntry.grams"
                                           @input="updateFields(solutionEntry, settings, 'grams');"
                                           @blur="solutionEntry.grams = parseFloat(solutionEntry.grams.toFixed(2))"
                                    >

                                </template>
                                <template x-if="isHuge ">
                                    <div class="input-group-append">
                                        <span class="input-group-text">gm</span>
                                    </div>
                                </template>
                                <!-- mg_per_ml -->
                                <template x-if="solutionEntry.input === 0">
                                    <input class="form-control"
                                           min="0"
                                           type="number"
                                           :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                           inputmode="decimal"
                                           max="10000"
                                           step="2.5"
                                           x-model.number="solutionEntry.mg_per_ml"
                                           @input="updateFields(solutionEntry, settings, 'mg_per_ml')"
                                           @blur="solutionEntry.mg_per_ml = parseFloat(solutionEntry.mg_per_ml.toFixed(2))"
                                    >
                                </template>
                                <!-- purity -->
                                <template x-if="solutionEntry.input === 2">
                                    <input class="form-control"
                                           min="0"
                                           type="number"
                                           :class="checkSaturation(solutionEntry, compounds, settings.totalVolume)"
                                           inputmode="decimal"
                                           max="100"
                                           step="2.5"
                                           x-model.number="solutionEntry.purity"
                                           @input="updateFields(solutionEntry, settings, 'purity')"
                                           @blur="solutionEntry.mg_per_ml = parseFloat(solutionEntry.mg_per_ml.toFixed(2))"
                                    >
                                </template>
                                <div class="dropdown">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            x-text="availableInputLabels(solutionEntry)[solutionEntry.input]"
                                            data-bs-toggle="dropdown">
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <button x-text='availableInputLabels(solutionEntry)[0]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 0">
                                            </button>
                                        </li>
                                        <template x-if="isSmall">
                                            <li>
                                                <button x-text='availableInputLabels(solutionEntry)[1]'
                                                        class="dropdown-item text-danger"
                                                        @click="solutionEntry.input = 1">
                                                </button>
                                            </li>
                                        </template>
                                        <li>
                                            <button x-text='"purity " + availableInputLabels(solutionEntry)[2]'
                                                    class="dropdown-item text-danger"
                                                    @click="solutionEntry.input = 2">
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <div class="invalid-feedback"
                                     x-text="'Range for %' + calculateSolventPercentage(compounds, settings.totalVolume) + ' solvent is ' + estimateSaturationForCompound(solutionEntry, compounds, settings.totalVolume)[0] + 'mg - ' + estimateSaturationForCompound(solutionEntry, compounds, settings.totalVolume)[1]+ 'mg.'  ">
                                </div>
                            </div>
                        </template>
                        <div class="input-group">
                            <div x-show="settings.remainingVolume < 0"
                                 class="alert alert-danger" role="alert">
                                ⚠️ <strong>
                                <span x-text="Math.abs(settings.remainingVolume).toFixed(2)"></span> mL over volume
                            </strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="border rounded p-2 mb-2 row">
        <h4>Formulation overview</h4>
        <!-- Formulation overview -->
        <template x-for="solutionMeasurement in solutionMeasurements" :key="solutionMeasurement.id">
            <!-------------------------------------- Formulation Overview Column 1 --------------------------------->
            <div class="border rounded p-2 mb-2 col-12 col-med-6 col-lg-4">
                <!-- TABLE VIEW -->
                <div class="">

                    <template x-for="compound in solutionMeasurement.compounds" :key="compound.id">

                        <div class="rounded mb-1">
                            <template x-if="compound.basis === 'mg_per_ml'">
                                <div class="fw-semibold mb-1"
                                     x-text="compound.name + ' (' + compound.purity + '% purity)'"></div>
                            </template>
                            <template x-if="compound.basis !== 'mg_per_ml'">
                                <div class="fw-semibold mb-1"
                                     x-text="compound.name + ' (' + compound.v_v_percent.toFixed(2) + ' % v.v)'"></div>
                            </template>
                            <div class="d-flex justify-content-between">
                                <span>Weight</span>
                                <span>
                                  <span
                                          x-text="compound.grams.toFixed(2) + ' gm'"></span>
                            </span>
                            </div>
                            <template x-if="compound.basis !== 'mg_per_ml'">
                                <div class="d-flex justify-content-between">
                                    <span>Viscosity</span>
                                    <span>

                                      <span x-show="compound.basis !== 'mg_per_ml'"
                                            x-text="compound.viscosityArray[0] + ' cP'"></span>
                                    </span>
                                </div>
                            </template>
                            <div class="d-flex justify-content-between">
                                <template x-if="compound.basis === 'mg_per_ml'">
                                    <span>Displacement</span>
                                </template>
                                <template x-if="compound.basis !== 'mg_per_ml'">
                                    <span>Volume</span>
                                </template>
                                <span>
                                      <span
                                              x-text="compound.mls.toFixed(2) + ' ml'"></span>
                                    </span>
                            </div>
                        </div>

                    </template>
                    <!--  let solutionCalculatedMeasurements = {
                            id: crypto.randomUUID(),
                            viscosity: 0,
                            filterTime: 0,
                            title: "",
                            compounds: [],
                        }
                    -->
                    <div class="">
                        <div class="fw-semibold mb-1">Batch Totals</div>
                        <div class="d-flex justify-content-between">
                            <span>Total Displacement</span>
                            <span>
                          <span x-text="calculateBatchTotals(solutionMeasurement.compounds).mls.toFixed(2) + ' ml'">
                          </span>
                        </span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Total Weight</span>
                            <span>
                          <span x-text="calculateBatchTotals(solutionMeasurement.compounds).grams.toFixed(2) + ' gm'">
                          </span>
                        </span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Filter Time</span>
                            <span>
                          <span x-text="solutionMeasurement.filterTime.toFixed(2) + ' minutes'">
                          </span>
                        </span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Excipients Avg Viscosity</span>
                            <span>
                          <span x-text="solutionMeasurement.viscosity.toFixed(2) + ' cP'">
                          </span>
                        </span>
                        </div>

                    </div>
                </div>
                <button type="button" class="btn btn-danger" @click="deleteBatch(solutionMeasurement.id)">Delete Batch
                </button>
            </div>
        </template>
    </div>


</div>
</body>
</html>
