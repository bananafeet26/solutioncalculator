    // Custom function to wrap text inside a box
    function wrapText(text, x, y, maxWidth, lineHeight, draw = true) {
        if (!text || text.trim() === '') return lineHeight;

        const words = text.split(' ');
        let line = '';
        let currentY = y;
        let totalHeight = lineHeight;

        ctx.textBaseline = "top";

        for (let n = 0; n < words.length; n++) {
            const testLine = line + words[n] + ' ';
            const metrics = ctx.measureText(testLine);

            if (metrics.width > maxWidth && n > 0) {
                if (draw) ctx.fillText(line.trim(), x, currentY);
                line = words[n] + ' ';
                currentY += lineHeight;
                totalHeight += lineHeight;
            } else {
                line = testLine;
            }
        }

        if (draw) ctx.fillText(line.trim(), x, currentY);

        return totalHeight;
    }

                resolve();   // Important: resolve when image is loaded

            img.onerror = () => {

    }
