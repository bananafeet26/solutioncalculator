<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pharma Box Image Editor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        canvas { border: 2px solid #333; background: white; max-width: 100%; }
        .controls { margin: 15px 0; }
        button { padding: 10px 16px; margin: 5px; }
    </style>
</head>
<body>

<h1>Box Template Editor (Canvas)</h1>

<input type="file" id="upload" accept="image/*">
<button onclick="loadOriginal()">Load Original Box Image</button>

<div class="controls">
    <input type="text" id="ndc" placeholder="NDC 55150-336-01" value="NDC 55150-336-01">
    <input type="text" id="lot" placeholder="Lot Number" value="LOT123456">
    <input type="text" id="exp" placeholder="Exp Date" value="EXP 12/2027">
    <button onclick="updateText()">Update Text</button>
    <button onclick="downloadImage()">Download Edited Image (PNG)</button>
</div>

<canvas id="canvas" width="1200" height="800"></canvas>

<script>
    // Main canvas setup
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let originalImage = null;

    // Load the original box image you uploaded
    function loadOriginal() {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = "/home/workdir/attachments/image.jpeg";   // or use a public URL if needed
        img.onload = () => {
            originalImage = img;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            console.log("Original box loaded");
        };
    }

    // Update text on specific areas (you can extend this)
    function updateText() {
        if (!originalImage) {
            alert("Load the original image first");
            return;
        }

        // Redraw base image
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "black";
        ctx.font = "bold 28px Arial";

        // Example positions - you will need to adjust these coordinates
        ctx.fillText(document.getElementById('ndc').value, 80, 180);
        ctx.fillText(document.getElementById('lot').value, 80, 650);
        ctx.fillText(document.getElementById('exp').value, 420, 650);

        // Add more text replacements, logos, etc.
    }

    // Download the edited result
    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'edited-box.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // Allow uploading your own base image
    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
